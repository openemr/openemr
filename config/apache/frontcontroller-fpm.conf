ServerName localhost
ServerTokens Prod
ServerSignature Off

LoadModule rewrite_module modules/mod_rewrite.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_fcgi_module modules/mod_proxy_fcgi.so

<VirtualHost *:80>
    DocumentRoot /app/public

    # Proxy PHP requests to php-fpm
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://${FASTCGI_HOST}:${FASTCGI_PORT}"
    </FilesMatch>

    # Shared settings for all app directories
    <Directory /app>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Front controller: serve file if exists, otherwise proxy to php-fpm
    <Directory /app/public>
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} -f
        RewriteRule ^ - [L]
        RewriteRule ^ index.php [L]
    </Directory>

    # Static assets only from legacy directories (not PHP)
    AliasMatch ^/(library|interface|portal|gacl)(/.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map))$ /app/$1$2

    # Handle /public/ prefix URLs
    Alias /public /app/public

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
# vim: ft=apache
