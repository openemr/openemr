ServerName localhost

LoadModule rewrite_module modules/mod_rewrite.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_fcgi_module modules/mod_proxy_fcgi.so

<VirtualHost *:80>
    DocumentRoot /app/public

    # Proxy PHP requests to php-fpm
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://${FASTCGI_HOST}:${FASTCGI_PORT}"
    </FilesMatch>

    # Front controller: send all non-file requests to index.php
    <Directory /app/public>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        DirectoryIndex index.php

        RewriteEngine On
        # If file exists, serve it
        RewriteCond %{REQUEST_FILENAME} -f
        RewriteRule ^ - [L]

        # Everything else goes to front controller
        RewriteRule ^ index.php [L]
    </Directory>

    # Legacy assets outside /public (e.g. /library/js/, /interface/*.css)
    Alias /library /app/library
    Alias /interface /app/interface
    Alias /portal /app/portal
    Alias /gacl /app/gacl

    <Directory /app/library>
        Options -Indexes
        Require all granted
    </Directory>

    <Directory /app/interface>
        Options -Indexes +FollowSymLinks
        Require all granted
        AllowOverride None
    </Directory>

    <Directory /app/portal>
        Options -Indexes +FollowSymLinks
        Require all granted
        AllowOverride None
    </Directory>

    <Directory /app/gacl>
        Options -Indexes
        Require all granted
    </Directory>

    # Handle /public/ prefix URLs (OpenEMR generates these)
    Alias /public /app/public

    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
# vim: ft=apache
