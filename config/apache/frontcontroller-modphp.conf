<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /app/public

    <Directory /app/public>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        DirectoryIndex index.php

        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} -f
        RewriteRule ^ - [L]
        RewriteRule ^ index.php [L]
    </Directory>

    # Legacy assets outside /public/
    Alias /library /app/library
    Alias /interface /app/interface
    Alias /portal /app/portal
    Alias /gacl /app/gacl

    <Directory /app/library>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /app/interface>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /app/portal>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /app/gacl>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Handle /public/ prefix URLs
    Alias /public /app/public

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
# vim: ft=apache
