ServerTokens Prod
ServerSignature Off

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /app/public

    # Shared settings for all app directories
    <Directory /app>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Front controller: serve file if exists, otherwise index.php
    <Directory /app/public>
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} -f
        RewriteRule ^ - [L]
        RewriteRule ^ index.php [L]
    </Directory>

    # Static assets only from legacy directories (not PHP)
    AliasMatch ^/(library|interface|portal|gacl)(/.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map))$ /app/$1$2

    # Handle /public/ prefix URLs
    Alias /public /app/public

    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
# vim: ft=apache
