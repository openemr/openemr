<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Clinical Co-Pilot</title>
  <style>
    :root {
      --bg: #0e1116;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --bad: #f85149;
      --ok: #3fb950;
      --warn: #d29922;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      display: flex; flex-direction: column;
    }
    header {
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
    }
    header h1 { font-size: 14px; margin: 0; font-weight: 600; }
    header .badge {
      font-size: 11px; padding: 2px 8px; border-radius: 999px;
      background: rgba(88,166,255,0.15); color: var(--accent); font-weight: 500;
    }
    .session-bar {
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    }
    input, button {
      background: var(--panel); color: var(--text); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 12px; font: inherit;
    }
    input { min-width: 320px; }
    button { cursor: pointer; }
    button:hover { background: #21262d; }
    button.primary { background: var(--accent); color: #0d1117; border-color: var(--accent); font-weight: 600; }
    button.primary:hover { background: #79b8ff; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    main {
      flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 16px;
      max-width: 980px; margin: 0 auto; width: 100%;
    }
    .convo { flex: 1; display: flex; flex-direction: column; gap: 16px; }
    .msg {
      padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--panel); white-space: pre-wrap;
    }
    .msg.user { background: rgba(88,166,255,0.05); border-color: rgba(88,166,255,0.3); }
    .msg .role { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .claims, .gaps, .trace { margin-top: 10px; font-size: 12px; }
    .claims summary, .gaps summary, .trace summary { cursor: pointer; color: var(--muted); }
    .claim { padding: 6px 0; border-top: 1px dashed var(--border); }
    .claim-label { font-weight: 500; color: var(--text); }
    .claim-text { color: var(--muted); margin-top: 2px; font-size: 11px; }
    .claim-rid { display: block; font-size: 10px; color: var(--muted); margin-top: 2px; opacity: 0.7; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .gap { padding: 4px 0; color: var(--warn); }
    .trace pre {
      background: #0d1117; border: 1px solid var(--border); border-radius: 4px;
      padding: 8px; overflow: auto; max-height: 240px; margin: 4px 0 0; font-size: 11px;
    }
    .composer {
      display: flex; gap: 8px; padding: 12px; background: var(--panel);
      border: 1px solid var(--border); border-radius: 8px;
    }
    .composer textarea {
      flex: 1; resize: none; background: transparent; color: var(--text);
      border: none; font: inherit; min-height: 44px; outline: none;
    }
    .empty {
      color: var(--muted); padding: 32px; text-align: center;
      border: 1px dashed var(--border); border-radius: 8px;
    }
    .pill {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; padding: 2px 8px; border-radius: 999px;
      border: 1px solid var(--border); margin-right: 6px;
    }
    .pill.ok { color: var(--ok); border-color: rgba(63,185,80,0.4); }
    .pill.bad { color: var(--bad); border-color: rgba(248,81,73,0.4); }
    .resume-banner {
      padding: 14px 16px; border: 1px solid rgba(88,166,255,0.4);
      background: rgba(88,166,255,0.08); border-radius: 8px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .resume-banner .label { flex: 1; min-width: 220px; color: var(--text); }
    .resume-banner .meta { color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>Clinical Co-Pilot</h1>
    <span class="badge">v0.1 · single-patient · point-of-care</span>
  </header>

  <div class="session-bar">
    <input id="patient-id" placeholder="Patient FHIR id (UUID)" />
    <button id="start-session" class="primary">Open chart</button>
    <span id="session-status" style="color: var(--muted)"></span>
  </div>

  <main>
    <div id="convo" class="convo">
      <div class="empty">Open a patient chart to start a session.</div>
    </div>
    <div class="composer">
      <textarea id="prompt" placeholder="Ask about this patient — e.g. 'Brief me on this patient'" disabled></textarea>
      <button id="send" class="primary" disabled>Send</button>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const convo = $("convo");
    const promptEl = $("prompt");
    const sendBtn = $("send");
    const startBtn = $("start-session");
    const patientIdEl = $("patient-id");
    const sessionStatus = $("session-status");

    let sessionId = null;
    let patientPseudonym = null;
    // Captured from ?physician_user_id=<authUser> at iframe-load time. The
    // OpenEMR rail fragment passes the logged-in clinician's username so
    // the session is created for the right physician (and the panel gate
    // enforces accordingly). When absent (standalone dev surface),
    // /v1/sessions falls back to the demo physician on the server side.
    let physicianUserId = null;
    // ?debug=1 toggles the per-turn full-trace expander (token counts,
    // tool latencies, verification rejections). Hidden by default — the
    // clinician surface stays clean. Admins/recordings append &debug=1
    // to the iframe URL.
    let debugMode = false;

    async function startSession() {
      const pid = patientIdEl.value.trim();
      if (!pid) return;
      startBtn.disabled = true;
      sessionStatus.textContent = "starting…";
      try {
        const body = {patient_id: pid};
        if (physicianUserId) body.physician_user_id = physicianUserId;
        const r = await fetch("/v1/sessions", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify(body),
        });
        if (r.status === 403) {
          sessionStatus.innerHTML = `<span class="pill bad">out of panel</span>`;
          appendNote("This patient is not in your panel. Co-Pilot will not load data for patients outside your assigned list.");
          return;
        }
        if (!r.ok) throw new Error(`session start failed (${r.status})`);
        const j = await r.json();
        sessionId = j.session_id;
        patientPseudonym = j.patient_pseudonym;
        convo.innerHTML = "";
        appendNote(`Session started for ${patientPseudonym} (real id stays server-side).`);
        sessionStatus.innerHTML = `<span class="pill ok">${patientPseudonym}</span>`;
        promptEl.disabled = false;
        sendBtn.disabled = false;
        promptEl.focus();
      } catch (e) {
        sessionStatus.innerHTML = `<span class="pill bad">${e.message}</span>`;
      } finally {
        startBtn.disabled = false;
      }
    }

    async function probeRecent(physician, pid) {
      // Returns {found, conversation_id, last_used_at, turn_count, patient_pseudonym}
      // or {found:false}. Failures are treated as "no recent" — the iframe just
      // proceeds with a fresh session.
      try {
        const url = `/v1/sessions/recent?physician_user_id=${encodeURIComponent(physician)}&patient_id=${encodeURIComponent(pid)}`;
        const r = await fetch(url);
        if (!r.ok) return {found: false};
        return await r.json();
      } catch (e) {
        return {found: false};
      }
    }

    function renderResumeBanner(recent) {
      // Builds the "Resume previous chat?" banner. The user picks one of the
      // two paths; on choice the banner is removed and the corresponding flow
      // runs (resume or fresh-start).
      convo.innerHTML = "";
      const banner = document.createElement("div");
      banner.className = "resume-banner";
      const when = formatRelative(recent.last_used_at);
      banner.innerHTML = `
        <div class="label">
          <strong>Resume previous chat?</strong>
          <div class="meta">${recent.turn_count} turn${recent.turn_count === 1 ? "" : "s"} · last used ${escape(when)} · ${escape(recent.patient_pseudonym || "")}</div>
        </div>
        <button id="resume-yes" class="primary">Yes, resume</button>
        <button id="resume-no">No, start new</button>
      `;
      convo.appendChild(banner);
      document.getElementById("resume-yes").addEventListener("click", () => resumeSession(recent.conversation_id));
      document.getElementById("resume-no").addEventListener("click", () => discardAndStartNew(recent.conversation_id));
    }

    async function resumeSession(conversationId) {
      sessionStatus.textContent = "resuming…";
      try {
        const r = await fetch("/v1/sessions/resume", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({conversation_id: conversationId}),
        });
        if (r.status === 403) {
          sessionStatus.innerHTML = `<span class="pill bad">out of panel</span>`;
          convo.innerHTML = "";
          appendNote("This patient is no longer in your panel. The previous conversation cannot be resumed.");
          return;
        }
        if (!r.ok) throw new Error(`resume failed (${r.status})`);
        const j = await r.json();
        sessionId = j.session_id;
        patientPseudonym = j.patient_pseudonym;
        convo.innerHTML = "";
        appendNote(`Resumed conversation for ${patientPseudonym}.`);
        replayHistory(j.messages || []);
        sessionStatus.innerHTML = `<span class="pill ok">${patientPseudonym}</span>`;
        promptEl.disabled = false;
        sendBtn.disabled = false;
        promptEl.focus();
      } catch (e) {
        sessionStatus.innerHTML = `<span class="pill bad">${e.message}</span>`;
      }
    }

    async function discardAndStartNew(oldConversationId) {
      // Mark the prior conversation as ended so it won't be offered for
      // resume next time, then start a fresh session as today.
      try {
        await fetch(`/v1/sessions/${encodeURIComponent(oldConversationId)}/end`, {method: "POST"});
      } catch (e) {
        // Non-fatal — the worst case is the banner shows again next load.
      }
      convo.innerHTML = "";
      startSession();
    }

    function replayHistory(messages) {
      // Re-render persisted (user, assistant) pairs into the existing DOM.
      // Replayed assistant turns render with the verified pill (they passed
      // the gate at original turn) but no latency/token metrics — those
      // belong to the original Langfuse trace, not this session.
      for (const m of messages) {
        if (m.role === "user") {
          appendUser(m.content);
        } else if (m.role === "assistant") {
          const el = appendAssistant(m.content, null, null);
          renderAssistant(el, {
            prose: m.content,
            claims: m.claims || [],
            data_gaps: m.data_gaps || [],
          }, {
            verification_passed: true,
            tool_call_sequence: [],
            tool_latencies_ms: {},
            tool_failures: {},
            verification_rejections: [],
            domain_rule_rejections: [],
            tokens_input: 0, tokens_output: 0, tokens_cached: 0,
            total_latency_ms: 0,
          });
        }
      }
    }

    function formatRelative(iso) {
      if (!iso) return "recently";
      const t = new Date(iso).getTime();
      if (isNaN(t)) return "recently";
      const ms = Date.now() - t;
      const mins = Math.floor(ms / 60000);
      if (mins < 1) return "just now";
      if (mins < 60) return `${mins} min ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      return `${days}d ago`;
    }

    async function send() {
      const q = promptEl.value.trim();
      if (!q || !sessionId) return;
      appendUser(q);
      promptEl.value = "";
      sendBtn.disabled = true;
      const placeholder = appendAssistant("…thinking", null, null);
      try {
        const r = await fetch("/v1/chat", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({session_id: sessionId, question: q}),
        });
        if (!r.ok) {
          const text = await r.text();
          placeholder.querySelector(".prose").textContent = `error: ${r.status} ${text}`;
          return;
        }
        const j = await r.json();
        renderAssistant(placeholder, j.response, j.trace);
      } catch (e) {
        placeholder.querySelector(".prose").textContent = `error: ${e.message}`;
      } finally {
        sendBtn.disabled = false;
        promptEl.focus();
      }
    }

    function appendUser(text) {
      const el = document.createElement("div");
      el.className = "msg user";
      el.innerHTML = `<div class="role">Physician</div><div class="prose"></div>`;
      el.querySelector(".prose").textContent = text;
      convo.appendChild(el);
      el.scrollIntoView({behavior: "smooth"});
    }

    function appendNote(text) {
      const el = document.createElement("div");
      el.className = "empty";
      el.textContent = text;
      convo.appendChild(el);
    }

    function appendAssistant(prose, claims, trace) {
      const el = document.createElement("div");
      el.className = "msg";
      el.innerHTML = `
        <div class="role">Co-Pilot</div>
        <div class="prose"></div>
        <div class="meta"></div>
      `;
      el.querySelector(".prose").textContent = prose;
      convo.appendChild(el);
      el.scrollIntoView({behavior: "smooth"});
      return el;
    }

    function renderAssistant(el, response, trace) {
      el.querySelector(".prose").textContent = response.prose || "(no response)";
      const meta = el.querySelector(".meta");
      const verifPill = trace.verification_passed
        ? `<span class="pill ok">verified ✓</span>`
        : `<span class="pill bad">claims stripped</span>`;
      const tools = (trace.tool_call_sequence || []).join(" → ") || "—";
      const lat = Math.round(trace.total_latency_ms);
      const tokens = `${trace.tokens_input}↓ / ${trace.tokens_output}↑${trace.tokens_cached ? ` / ${trace.tokens_cached}⚡` : ""}`;

      let html = `<div style="margin-top:8px">${verifPill} <span class="pill">${lat}ms</span> <span class="pill">${tokens}</span></div>`;

      if (response.claims && response.claims.length) {
        html += `<details class="claims" open><summary>${response.claims.length} cited claim${response.claims.length>1?"s":""}</summary>`;
        for (const c of response.claims) {
          // Show the human-readable display label only; record_id is the
          // server-side audit anchor and not useful to a clinician.
          const label = c.display || c.text || c.record_id;
          html += `<div class="claim"><div class="claim-label">${escape(label)}</div></div>`;
        }
        html += `</details>`;
      }
      if (response.data_gaps && response.data_gaps.length) {
        html += `<details class="gaps" open><summary>${response.data_gaps.length} data gap${response.data_gaps.length>1?"s":""}</summary>`;
        for (const g of response.data_gaps) {
          html += `<div class="gap">⚠︎ ${escape(g)}</div>`;
        }
        html += `</details>`;
      }
      // Full trace is debug-only — visible when iframe loaded with ?debug=1
      // (admin/recording surface). Hidden by default for clinician UX.
      if (debugMode) {
        html += `<details class="trace"><summary>full trace</summary><pre>${escape(JSON.stringify({tools_called: trace.tool_call_sequence, latencies_ms: trace.tool_latencies_ms, failures: trace.tool_failures, verification_rejections: trace.verification_rejections, domain_rule_rejections: trace.domain_rule_rejections}, null, 2))}</pre></details>`;
      }
      meta.innerHTML = html;
    }

    function escape(s) {
      return String(s ?? "").replace(/[&<>]/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;"})[c]);
    }

    startBtn.addEventListener("click", startSession);
    sendBtn.addEventListener("click", send);
    patientIdEl.addEventListener("keydown", (e) => { if (e.key === "Enter") startSession(); });
    promptEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });

    // Auto-bind to ?patient_id=<uuid>&physician_user_id=<authUser> so the
    // OpenEMR iframe rail opens scoped to the right doctor + patient.
    const _params = new URLSearchParams(location.search);
    if (_params.has("physician_user_id")) {
      physicianUserId = _params.get("physician_user_id").trim() || null;
    }
    if (_params.get("debug") === "1") {
      debugMode = true;
    }
    if (_params.has("patient_id")) {
      patientIdEl.value = _params.get("patient_id").trim();
      // Hide the manual patient-id input + "Open chart" button in embedded
      // mode — the iframe is already scoped via the URL param.
      patientIdEl.style.display = "none";
      startBtn.style.display = "none";
      // Probe for a resumable conversation first. If found, the banner is
      // shown and the user picks; if not, we start a fresh session as before.
      (async () => {
        if (physicianUserId) {
          const recent = await probeRecent(physicianUserId, patientIdEl.value);
          if (recent && recent.found) {
            renderResumeBanner(recent);
            return;
          }
        }
        setTimeout(startSession, 50);
      })();
    }
  </script>
</body>
</html>
