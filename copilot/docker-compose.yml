services:
  copilot:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      CONVERSATION_DB_PATH: /data/copilot.db
    volumes:
      - ./app:/srv/app:ro
      - copilot-data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload

volumes:
  copilot-data:
