<script type="text/javascript">
    // ============= UNIFIED PERSON SEARCH AND CREATE =============

    const tableId = "table_edit_relations___UNIQ__";
    const webroot = "";
    let searchTimeout = null;
    let lastSearchParams = { first_name: '', last_name: '', dob: '', phone: '', email: '' };

    let csrfToken = document.getElementById('addPersonSection')?.dataset.csrfToken;
    console.log('csrfToken '+csrfToken);
    if (!csrfToken) {
        console.error('CSRF token not found!');
    }


function DateToYYYYMMDD_js(value){
    var value = value.replace(/\//g,'-');
    var parts = value.split('-');
    var date_display_format = 0;

    if (date_display_format == 1)      // mm/dd/yyyy, note year is added below
        value = parts[2] + '-' + parts[0]  + '-' + parts[1];
    else if (date_display_format == 2) // dd/mm/yyyy, note year is added below
        value = parts[2] + '-' + parts[1]  + '-' + parts[0];

    return value;
}

function TimeToHHMMSS_js(value){
    if (value.trim() == '') {
        return '';
    }

    var is_pm = value.trim().toUpperCase().indexOf('PM');
    if (is_pm > 0) {
        let d = new Date("1970-01-01 " + value);
        let value = d.setHours(d.getHours() + 12).toTimeString();
    }
    return value.trim();
}

function DateToYYYYMMDDHHMMSS_js(value){
    if (typeof value === 'undefined' || value.trim() == '') {
        return undefined;
    }
    var parts = value.split(' ');

    var datePart = DateToYYYYMMDD_js(parts[0]);
    var timePart = TimeToHHMMSS_js(parts[1]);

    var value = datePart + ' ' + timePart;

    return value.trim();
}


    // Setup add button
    var addButton = document.getElementById("btn_add_relation_" + tableId);
    if (addButton) {
        console.log('Setting up add button:', addButton.id);
        addButton.addEventListener('click', function(event) {
            console.log('Add telecom button clicked:', tableId);
            event.preventDefault();
            event.stopPropagation();
            openPersonSearch(event);
        });
    } else {
        console.warn('Add telecom button not found for table:', tableId);
    }



    function openPersonSearch() {
        const section = document.getElementById('addPersonSection');
        section.classList.remove('d-none');
        section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        // Focus on first input after animation
        setTimeout(() => {
            document.getElementById('person_first_name').focus();
        }, 300);

        // Setup live search listeners
        setupLiveSearch();
    }

    function closeAddPersonSection() {
        const section = document.getElementById('addPersonSection');
        section.classList.add('d-none');
        clearAllFields();
        document.getElementById('personSearchResults').innerHTML = '';
        lastSearchParams = { first_name: '', last_name: '', dob: '', phone: '', email: '' };
    }

    function clearAllFields() {
        document.getElementById('person_first_name').value = '';
        document.getElementById('person_last_name').value = '';
        document.getElementById('person_middle_name').value = '';
        document.getElementById('person_dob').value = '';
        document.getElementById('form_person_gender').value = '';
        document.getElementById('person_phone').value = '';
         document.getElementById('person_notes').value = '';
    }

    function setupLiveSearch() {
        const inputs = [
            document.getElementById('person_first_name'),
            document.getElementById('person_last_name'),
            document.getElementById('person_dob'),
            document.getElementById('person_phone'),
        ];

        // Remove existing listeners by cloning
        inputs.forEach((input, index) => {
            if (input) {
                const newInput = input.cloneNode(true);
                input.parentNode.replaceChild(newInput, input);
                inputs[index] = newInput;

                newInput.addEventListener('input', function() {
                    triggerLiveSearch();
                });
            }
        });

        let datepicker = document.getElementById('person_dob');
        datetimepickerTranslated(datepicker, {
            timepicker: false
            , showSeconds: false
            , formatInput: true
        });
    }

    function triggerLiveSearch() {
        // Clear existing timeout
        if (searchTimeout) {
            clearTimeout(searchTimeout);
        }

        // Get current values
        const first_name = document.getElementById('person_first_name').value.trim();
        const last_name = document.getElementById('person_last_name').value.trim();
        const dob = document.getElementById('person_dob')?.value || '';
        const phone = document.getElementById('person_phone').value.trim();

        // Check if anything has changed
        if (first_name === lastSearchParams.first_name &&
            last_name === lastSearchParams.last_name &&
            dob === lastSearchParams.dob &&
            phone === lastSearchParams.phone) {
            return;
        }

        // If all fields are empty, clear results
        if (!first_name && !last_name && !dob && !phone ) {
            document.getElementById('personSearchResults').innerHTML = '';
            hideLiveSearchIndicator();
            return;
        }

        // Show searching indicator
        showLiveSearchIndicator();

        // Debounce search - wait 500ms after user stops typing
        searchTimeout = setTimeout(() => {
            performSearch(first_name, last_name, dob, phone);
        }, 500);
    }

    function performSearch(first_name, last_name, dob, phone) {
        lastSearchParams = { first_name, last_name, dob, phone };

        const resultsContainer = document.getElementById('personSearchResults');

        fetch(webroot + '/library/ajax/person_search_ajax.php', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-TOKEN': csrfToken
            },
            body: JSON.stringify({
                action: 'search_persons',
                csrf_token: csrfToken,
                first_name: first_name,
                last_name: last_name,
                birth_date: dob,
                phone: phone,
                foreign_table: null,
                foreign_id: null
            })
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok: ' + response.status);
            }
            return response.text();
        })
        .then(text => {
            hideLiveSearchIndicator();

            // Log the raw response for debugging
            console.log('Raw response:', text);

            // Try to parse as JSON
            let data;
            try {
                data = JSON.parse(text);
            } catch (e) {
                console.error('JSON parse error:', e);
                console.error('Response text:', text);
                resultsContainer.innerHTML = '<div class="alert alert-danger">' +
                    '<i class="fas fa-times-circle mr-2"></i>' +
                    '<strong>Server Error:</strong><br>' +
                    '<pre style="max-height: 300px; overflow: auto; font-size: 11px;">' +
                    escapeHtml(text) +
                    '</pre>' +
                    '</div>';
                return;
            }

            if (data.success) {
                displaySearchResults(data.persons);
            } else {
                resultsContainer.innerHTML = '<div class="alert alert-warning">' +
                    '<i class="fas fa-exclamation-triangle mr-2"></i>' +
                    escapeHtml(data.message || window.xl('Search failed')) +
                    '</div>';
            }
        })
        .catch(error => {
            console.error('Search error:', error);
            hideLiveSearchIndicator();
            resultsContainer.innerHTML = '<div class="alert alert-danger">' +
                '<i class="fas fa-times-circle mr-2"></i>' +
                window.xl('Error performing search. Please try again.') +
                '<br><small>' + escapeHtml(error.message) + '</small>' +
                '</div>';
        });
    }

    function showLiveSearchIndicator() {
        document.getElementById('liveSearchIndicator').classList.add('searching');
    }

    function hideLiveSearchIndicator() {
        document.getElementById('liveSearchIndicator').classList.remove('searching');
    }

    function displaySearchResults(persons) {
        const container = document.getElementById('personSearchResults');
        container.innerHTML = '';

        if (!persons || persons.length === 0) {
            return; // Just hide results if nothing found
        }

        const header = document.createElement('div');
        header.className = 'search-results-header';
        header.innerHTML = '<i class="fas fa-users mr-2"></i>' +
            window.xl('Found') + ' ' + persons.length + ' ' +
            (persons.length === 1 ? window.xl('existing person') : window.xl('existing persons')) + ':';
        container.appendChild(header);

        persons.forEach(person => {
            const div = document.createElement('div');
            div.className = 'person-search-result';

            // Determine badges to show
            let badges = '';

            if (person.is_patient && !person.is_linked) {
                badges += '<span class="badge badge-info ml-2">' +
                         (person.patient_label || window.xl('Patient')) + '</span>';
            }

            if (person.is_also_patient) {
                badges += '<span class="badge badge-success ml-2">' +
                         '<i class="fas fa-link"></i> ' + window.xl('Also Patient') +
                         ' ' + escapeHtml(person.linked_patient_pid) + '</span>';
            }

            if (person.is_linked && person.target_table === 'patient_data') {
                badges += '<span class="badge badge-secondary text-white ml-2">' +
                         '<i class="fas fa-check"></i> ' + window.xl('Already Linked') + '</span>';
            }

            div.innerHTML = `
                <div class="d-flex justify-content-between align-items-center">
                    <div class="flex-grow-1">
                        <strong>${escapeHtml(person.first_name)} ${person.middle_name ? escapeHtml(person.middle_name) + ' ' : ''}${escapeHtml(person.last_name)}</strong>
                        ${badges}
                        <br>
                        <small class="text-muted">
                            ${person.birth_date ? window.xl('DOB') + ': ' + escapeHtml(person.birth_date) : ''}
                            ${person.gender ? ' | ' + escapeHtml(person.gender) : ''}
                            ${person.phone ? ' | ' + escapeHtml(person.phone) : ''}
                        </small>
                    </div>
                    <button class="btn btn-primary btn-sm ml-2">
                        <i class="fas fa-check mr-1"></i>${window.xl('Select')}
                    </button>
                </div>
            `;

            div.onclick = function() {
                selectPerson(person);
            };

            container.appendChild(div);
        });
    }

    function selectPerson(person) {
        closeAddPersonSection();
        // Dispatch custom event to parent IIFE in relation_form.html.twig
        document.dispatchEvent(new CustomEvent('addRelationForPerson', {
            detail: {
                tableId: tableId,
                person: person
            }
        }));
    }

    function createNewPerson() {
        const first_name = document.getElementById('person_first_name').value.trim();
        const last_name = document.getElementById('person_last_name').value.trim();
        const middle_name = document.getElementById('person_middle_name').value.trim();
        const dob = document.getElementById('person_dob').value;
        const gender = document.getElementById('form_person_gender').value;
        const phone = document.getElementById('person_phone').value.trim();
        const notes = document.getElementById('person_notes').value.trim();

        // Validation
        if (!first_name || !last_name) {
            alert(window.xl('First name and last name are required'));
            document.getElementById('person_first_name').focus();
            return;
        }

        // Email validation if provided
        /*if (email && !isValidEmail(email)) {
            alert(window.xl('Please enter a valid email address'));
            document.getElementById('person_email').focus();
            return;
        }*/

        // Show loading state
        const createBtn = event.target;
        const originalBtnText = createBtn.innerHTML;
        createBtn.disabled = true;
        createBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>' + window.xl('Creating...');

        // Create person via AJAX
        fetch(webroot + '/library/ajax/person_search_ajax.php', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-TOKEN': csrfToken
            },
            body: JSON.stringify({
                action: 'create_person',
                csrf_token: csrfToken,
                first_name: first_name,
                last_name: last_name,
                middle_name: middle_name,
                birth_date: dob,
                gender: gender,
                phone: phone,
                notes: notes
            })
        })
        .then(response => {
            // Get raw text first to handle errors better
            return response.text().then(text => {
                console.log('Create person raw response:', text);

                // Try to parse as JSON
                try {
                    const data = JSON.parse(text);
                    return { ok: response.ok, status: response.status, data: data };
                } catch (e) {
                    console.error('JSON parse error:', e);
                    console.error('Response text:', text);
                    throw new Error('Server returned invalid JSON. Response: ' + text.substring(0, 200));
                }
            });
        })
        .then(result => {
            createBtn.disabled = false;
            createBtn.innerHTML = originalBtnText;

            console.log('Create person result:', result);

            if (result.data.success && result.data.person) {
                showSuccessMessage(window.xl('Person created successfully'));
                closeAddPersonSection();
                // Dispatch custom event to parent IIFE in relation_form.html.twig
                document.dispatchEvent(new CustomEvent('addRelationForPerson', {
                    detail: {
                        tableId: tableId,
                        person: result.data.person
                    }
                }));
            } else {
                alert(window.xl('Error creating person') + ': ' + (result.data.message || window.xl('Unknown error')));
            }
        })
        .catch(error => {
            console.error('Error creating person:', error);
            createBtn.disabled = false;
            createBtn.innerHTML = originalBtnText;
            alert(window.xl('Error creating person') + ': ' + error.message);
        });
    }

    // Utility Functions
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function isValidEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
    }

    function showSuccessMessage(message) {
        const alertDiv = document.createElement('div');
        alertDiv.className = 'alert alert-success alert-dismissible fade show';
        alertDiv.style.position = 'fixed';
        alertDiv.style.top = '20px';
        alertDiv.style.right = '20px';
        alertDiv.style.zIndex = '9999';
        alertDiv.style.minWidth = '300px';
        alertDiv.innerHTML = `
            <i class="fas fa-check-circle mr-2"></i>${escapeHtml(message)}
            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                <span aria-hidden="true">&times;</span>
            </button>
        `;
        document.body.appendChild(alertDiv);

        setTimeout(() => {
            alertDiv.classList.remove('show');
            setTimeout(() => alertDiv.remove(), 150);
        }, 3000);
    }

</script>

function DateToYYYYMMDD_js(value){
    var value = value.replace(/\//g,'-');
    var parts = value.split('-');
    var date_display_format = 0;

    if (date_display_format == 1)      // mm/dd/yyyy, note year is added below
        value = parts[2] + '-' + parts[0]  + '-' + parts[1];
    else if (date_display_format == 2) // dd/mm/yyyy, note year is added below
        value = parts[2] + '-' + parts[1]  + '-' + parts[0];

    return value;
}

function TimeToHHMMSS_js(value){
    if (value.trim() == '') {
        return '';
    }

    var is_pm = value.trim().toUpperCase().indexOf('PM');
    if (is_pm > 0) {
        let d = new Date("1970-01-01 " + value);
        let value = d.setHours(d.getHours() + 12).toTimeString();
    }
    return value.trim();
}

function DateToYYYYMMDDHHMMSS_js(value){
    if (typeof value === 'undefined' || value.trim() == '') {
        return undefined;
    }
    var parts = value.split(' ');

    var datePart = DateToYYYYMMDD_js(parts[0]);
    var timePart = TimeToHHMMSS_js(parts[1]);

    var value = datePart + ' ' + timePart;

    return value.trim();
}

            function changeTelecomStatus(event) {

                if (currentStatus === 'I') {

                } else {

            function telecomUpdated(event) {
                const formTelecoms = event.target.closest('.form_telecoms');
                if (!formTelecoms) return;

                const telecomsGroup = formTelecoms.closest('.telecoms_group');
                if (!telecomsGroup) return;

                const actionInput = telecomsGroup.querySelector('input.form_telecoms_data_action');
                if (!actionInput) return;

                const currentAction = actionInput.value;
                if (currentAction === 'ADD' || currentAction === 'INACTIVATE') {
                    return;
                }

                if (currentAction === 'NO CHANGE') {
                    actionInput.value = TELECOM_ACTION_VALUES.UPDATE;
                    console.log('Changed action to UPDATE for telecom:', telecomsGroup.querySelector('input.form_telecoms_contact_telecom_id')?.value);
                }
            }

            // Utility functions
            function setInputValue(root, selector, value) {
                let node = root.querySelector(selector);
                if (node) node.value = value;
            }

            function getInputValue(root, selector) {
                let node = root.querySelector(selector);
                return node ? node.value : "";
            }

            function getSelectDisplay(root, selector) {
                let node = root.querySelector(selector);
                if (!node) return "";
                let options = node.selectedOptions;
                return options && options.length ? options[0].textContent : "";
            }

            function getSelectValue(root, selector) {
                let node = root.querySelector(selector);
                if (!node) return "";
                let options = node.selectedOptions;
                return options && options.length ? options[0].value : "";
            }

            function hideElement(element) {
                element.classList.add('d-none');
            }

            function showElement(element) {
                element.classList.remove('d-none');
            }

function DateToYYYYMMDD_js(value){
    var value = value.replace(/\//g,'-');
    var parts = value.split('-');
    var date_display_format = 0;

    if (date_display_format == 1)      // mm/dd/yyyy, note year is added below
        value = parts[2] + '-' + parts[0]  + '-' + parts[1];
    else if (date_display_format == 2) // dd/mm/yyyy, note year is added below
        value = parts[2] + '-' + parts[1]  + '-' + parts[0];

    return value;
}

function TimeToHHMMSS_js(value){
    if (value.trim() == '') {
        return '';
    }

    var is_pm = value.trim().toUpperCase().indexOf('PM');
    if (is_pm > 0) {
        let d = new Date("1970-01-01 " + value);
        let value = d.setHours(d.getHours() + 12).toTimeString();
    }
    return value.trim();
}

function DateToYYYYMMDDHHMMSS_js(value){
    if (typeof value === 'undefined' || value.trim() == '') {
        return undefined;
    }
    var parts = value.split(' ');

    var datePart = DateToYYYYMMDD_js(parts[0]);
    var timePart = TimeToHHMMSS_js(parts[1]);

    var value = datePart + ' ' + timePart;

    return value.trim();
}

                }

                const addAddressButton = document.getElementById(target.id);

                let row_address_template = null;

                if (table) {
                    let nextSibling = table.nextElementSibling;
                    while (nextSibling) {

                            row_address_template = nextSibling;
                            console.log('  âœ“ Found template as immediate sibling');

                if (!row_address_template) {
                    console.error('âœ— Could not find template for this address table');

                // Find no_addresses element within this specific container
                let noAddressesElement = table.querySelector(".no_addresses");

                if (noAddressesElement && !noAddressesElement.classList.contains('d-none')) {
                    hideElement(noAddressesElement);
                }

                // Find the highest existing index
                var allGroups = container.querySelectorAll('.addresses_group[data-index]');
                var maxIndex = -1;
                allGroups.forEach(function(group) {
                    var idx = parseInt(group.getAttribute('data-index'));
                    if (!isNaN(idx) && idx > maxIndex) {
                        maxIndex = idx;
                    }
                });
                var newIndex = maxIndex + 1;

                // Clone and replace __A-INDEX__ with actual index
                var tempDiv = document.createElement('div');
                tempDiv.innerHTML = row_address_template.innerHTML;
                var html = tempDiv.innerHTML;

                // Check if we're inside a relation form (nested scenario)
                var relationGroup = container.closest('.relations_group');

                if (relationGroup) {
                    relationIndex = relationGroup.getAttribute('data-index');
                    console.log('Found parent relation with index:', relationIndex);
                }

                // Replace __A-INDEX__ with actual index
                html = html.replace(/__A-INDEX__/g, newIndex);

                // If we're in a nested relation form, fix the field naming
                if (relationIndex !== null) {
                    console.log('Fixing nested field names for relation index:', relationIndex);

                    // Fix the pattern: [addresses][NUMBER] should become [RELATION_INDEX][addresses][NUMBER]
                    var namePattern = /name="([^"]*)\[addresses\]\[(\d+)\]/g;
                    html = html.replace(namePattern, function(match, prefix, addressIdx) {
                        // Check if it already has the relation index
                        if (prefix.match(/\[\d+\]$/)) {

                        }
                        // Add the relation index
                        return 'name="' + prefix + '[' + relationIndex + '][addresses][' + addressIdx + ']';

            function changeEdit(event) {
                var row_form_addresses = event.target.closest('.form_addresses');

                }

                // Find the parent addresses_group, then find display_addresses within it

            function editAddress(event) {
                event.preventDefault();
                event.stopPropagation();

                const editButton = event.currentTarget;
                const row_display_addresses = editButton.closest('.display_addresses');
                const row_form_addresses = row_display_addresses.nextElementSibling;

                if (editButton.className.includes("fa-caret-right")) {
                    row_form_addresses.classList.remove('d-none');
                    editButton.className = "fas fa-solid fa-caret-down fa-lg text-primary btn-edit-address";
                } else {
                    row_form_addresses.classList.add('d-none');
                    editButton.className = "fas fa-solid fa-caret-right fa-lg text-primary btn-edit-address";
                }
            }

            function changeAddressStatus(event) {
                event.preventDefault();
                event.stopPropagation();

                const inactivateButton = event.currentTarget || event.target;

                const row_display_addresses = inactivateButton.closest('.display_addresses');
                if (!row_display_addresses) {
                    return;
                }

                const addresses_group = row_display_addresses.closest('.addresses_group');
                const currentStatus = addresses_group.getAttribute('data-status');

                // Get the hidden status input from addresses_group
                const statusInput = addresses_group.querySelector('input.form_addresses_status');
                const actionInput = addresses_group.querySelector('input.form_addresses_data_action');

                // Check if this is currently inactive (reactivate) or active (inactivate)
                if (currentStatus === 'I') {
                    // REACTIVATE
                    let prompt = window.xl("Reactivate this address?");
                    if (confirm(prompt)) {
                        // Remove inactive styling
                        addresses_group.classList.remove('address-inactive');
                        addresses_group.setAttribute('data-status', 'A');

                        // Remove inactive badge from display
                        var useSpan = row_display_addresses.querySelector('.display_addresses_use');
                        var badge = useSpan.querySelector('.badge');
                        if (badge) {
                            badge.remove();
                        }

                        // Change icon back to trash
                        inactivateButton.classList.remove('fa-house-circle-check', 'text-success');
                        inactivateButton.classList.add('fa-house-circle-xmark', 'text-danger');
                        inactivateButton.setAttribute('title', window.xl('Inactivate Address'));

                        // Set action to UPDATE and status to A
                        if (actionInput) {
                            actionInput.value = ADDRESS_ACTION_VALUES.UPDATE;
                        }
                        if (statusInput) {
                            statusInput.value = 'A';
                        }

                        console.log('Reactivated address:', addresses_group.querySelector('input.form_addresses_contact_address_id')?.value);
                    }
                } else {
                    // INACTIVATE
                    let prompt = window.xl("Are you sure you wish to inactivate this address?");
                    if (confirm(prompt)) {
                        // Mark as inactive
                        addresses_group.classList.add('address-inactive');
                        addresses_group.setAttribute('data-status', 'I');

                    // Add inactive badge to display
                    var useSpan = row_display_addresses.querySelector('.display_addresses_use');
                    if (!useSpan.querySelector('.badge')) {
                        var badge = document.createElement('span');
                        badge.className = 'badge badge-secondary text-white ml-1';
                        badge.style.fontSize = '0.7em';
                        badge.textContent = window.xl('Inactive');
                        useSpan.appendChild(badge);
                    }

                        // Change icon to restore icon
                        inactivateButton.classList.remove('fa-house-circle-xmark', 'text-danger');
                        inactivateButton.classList.add('fa-house-circle-check', 'text-success');
                        inactivateButton.setAttribute('title', window.xl('Reactivate Address'));

                        // Set action to INACTIVATE
                        if (actionInput) {
                            actionInput.value = ADDRESS_ACTION_VALUES.INACTIVATE;
                        }
                        if (statusInput) {
                            statusInput.value = 'I';
                        }

                        // Hide if "Show Inactive" is not checked
                        const tableId = addresses_group.closest('[id^="table_edit_addresses_"]').id;
                        const checkbox = document.getElementById('show_inactive_addresses_' + tableId);
                        if (!checkbox || !checkbox.checked) {
                            addresses_group.classList.add('d-none');
                        }

                        console.log('Marked address as inactive:', addresses_group.querySelector('input.form_addresses_contact_address_id')?.value);
                    }
                }
            }

            function createRecordFromInput(row_form_addresses) {

            function fullAddressFromRecord(record, lines) {
                var fullAddress = ["", ""];

                fullAddress[0] = [record.line1, record.line2].filter(x => x).join(", ");

                if (lines > 1) {
                    fullAddress[1] = [record.city, record.state, record.zip, record.country].filter(x => x).join(", ");
                } else {
                    fullAddress[0] = [fullAddress[0], record.city, record.state, record.zip, record.country].filter(x => x).join(", ");
                }

                return fullAddress[0] || fullAddress[1] ? fullAddress : ["None"];
            }

            function PeriodFromRecord(record) {
                let periodStart = record.period_start;
                let periodEnd = record.period_end;

                if (!periodStart && !periodEnd) return "";

                if (periodStart && !periodEnd) {
                    return periodStart + " " + window.xl('to') + " " + window.xl('Current');
                } else if (!periodStart && periodEnd) {
                    return window.xl('Expired') + ": " + periodEnd;
                } else {
                    return periodStart + " " + window.xl('to') + " " + periodEnd;
                }
            }

            function setInputValue(root, selector, value) {
                let node = root.querySelector(selector);
                if (node) node.value = value;
            }

            function getInputValue(root, selector) {
                let node = root.querySelector(selector);
                return node ? node.value : "";
            }

            function getSelectDisplay(root, selector) {
                let node = root.querySelector(selector);
                if (!node) return "";
                let options = node.selectedOptions;
                return options && options.length ? options[0].textContent : "";
            }

            function getSelectValue(root, selector) {
                let node = root.querySelector(selector);
                if (!node) return "";
                let options = node.selectedOptions;
                return options && options.length ? options[0].value : "";
            }

            function hideElement(element) {
                element.classList.add('d-none');

function DateToYYYYMMDD_js(value){
    var value = value.replace(/\//g,'-');
    var parts = value.split('-');
    var date_display_format = 0;

    if (date_display_format == 1)      // mm/dd/yyyy, note year is added below
        value = parts[2] + '-' + parts[0]  + '-' + parts[1];
    else if (date_display_format == 2) // dd/mm/yyyy, note year is added below
        value = parts[2] + '-' + parts[1]  + '-' + parts[0];

    return value;
}

function TimeToHHMMSS_js(value){
    if (value.trim() == '') {
        return '';
    }

    var is_pm = value.trim().toUpperCase().indexOf('PM');
    if (is_pm > 0) {
        let d = new Date("1970-01-01 " + value);
        let value = d.setHours(d.getHours() + 12).toTimeString();
    }
    return value.trim();
}

function DateToYYYYMMDDHHMMSS_js(value){
    if (typeof value === 'undefined' || value.trim() == '') {
        return undefined;
    }
    var parts = value.split(' ');

    var datePart = DateToYYYYMMDD_js(parts[0]);
    var timePart = TimeToHHMMSS_js(parts[1]);

    var value = datePart + ' ' + timePart;

    return value.trim();
}

            // ===== ADD RELATION FOR PERSON, AFTER PERSON CREATED BY relation_form_search.html.twig =====
            function addRelationForPerson(person) {

                    var idx = parseInt(group.getAttribute('data-index'));
                    if (!isNaN(idx) && idx > maxIndex) {
                        maxIndex = idx;
                    }
                });
                var newIndex = maxIndex + 1;

                // Clone the template
                var tempDiv = document.createElement('div');
                tempDiv.innerHTML = relation_template.innerHTML;
                var html = tempDiv.innerHTML;

                // Replace __RP-INDEX__ with actual index
                html = html.replace(/__RP-INDEX__/g, newIndex);

                // ===== TELECOM TABLE ID REPLACEMENTS =====
                // Create unique ID for related person telecom tables
                var newTelecomTableIdSuffix = js_uniqid();

                // Find the old telecom table ID
                var telecomMatch = html.match(/table_edit_telecoms_([a-f0-9]+)/);

                if (telecomMatch && telecomMatch[1]) {
                    var oldTelecomTableIdSuffix = telecomMatch[1];
                    console.log('Replacing telecom suffix:', oldTelecomTableIdSuffix, '→', newTelecomTableIdSuffix);

                    // Replace ALL occurrences of the old suffix with new suffix
                    var telecomRegex = new RegExp(oldTelecomTableIdSuffix, 'g');
                    html = html.replace(telecomRegex, newTelecomTableIdSuffix);
                }

                // ===== ADDRESS TABLE ID REPLACEMENTS =====
                // Create unique ID for related person address table
                var newAddressTableIdSuffix = js_uniqid();

                // Find the old address table ID
                var addressMatch = html.match(/table_edit_addresses_([a-f0-9]+)/);

                if (addressMatch && addressMatch[1]) {
                    var oldAddressTableIdSuffix = addressMatch[1];
                    console.log('Address: Replacing', oldAddressTableIdSuffix, '→', newAddressTableIdSuffix);

                    // Replace table ID everywhere it appears
                    var addressRegex = new RegExp(oldAddressTableIdSuffix, 'g');
                    html = html.replace(addressRegex, newAddressTableIdSuffix);

                // Update the HTML in the temp div

                if (notesDisplay) notesDisplay.textContent = person.notes || '';

                // TODO: @adunsulag review this heavily as recreating scripts can be very risky
                // ===== MAKE SCRIPTS EXECUTE IN CLONE =====
                // Scripts inserted via innerHTML don't execute, so we need to replace them
                var oldScripts = relation_clone.querySelectorAll('script');
                oldScripts.forEach(function(oldScript) {
                    var newScript = document.createElement('script');
                    newScript.type = 'text/javascript';

                    // Copy the script content
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.textContent = oldScript.textContent;
                    }

                    // Copy any other attributes
                    Array.from(oldScript.attributes).forEach(function(attr) {
                        if (attr.name !== 'type') {
                            newScript.setAttribute(attr.name, attr.value);
                        }
                    });

                    // Replace the old script with the new one
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });

                // Add Clone to container
                container.appendChild(relation_clone);
                const newRelation = container.querySelector('.relations_group:last-child');
                setupContainerDatePickers(newRelation);

                // Setup event listeners for the new relation row buttons
                const row = newRelation.querySelector('.relation-card-header');
                if (row) {
                    setupRelatedPersonsRowButtonEventListeners(row);
                }

                // Expand the new relation for editing
                if (newRelation) {
                    const formDiv = newRelation.querySelector('.form_relations');
                    if (formDiv) {
                        formDiv.classList.remove('d-none');

                        const icon = newRelation.querySelector('.btn-edit-relation');
                        if (icon) {
                            icon.classList.remove('fa-caret-right');
                            icon.classList.add('fa-caret-down');
                        }

                        newRelation.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

                        setTimeout(() => {
                            const firstSelect = formDiv.querySelector('select');
                            if (firstSelect) {
                                firstSelect.focus();
                            }
                        }, 300);
                    }
                }

                updateRelationDisplayOnChange(newRelation);
                console.log('=== Relation #' + newIndex + ' created successfully ===\n');
            }

            function disableHTML5Validation() {
                // Find the form and disable HTML5 validation
                const form = document.querySelector('form[name="DEM"]') || document.querySelector('form');

                if (form) {
                    // DISABLE HTML5 validation entirely
                    form.setAttribute('novalidate', 'novalidate');
                    console.log('HTML5 validation disabled for form');

                    // Add our own validation
                    form.addEventListener('submit', function(e) {
                        console.log('Form submitting - custom validation');

                        let isValid = true;
                        let firstInvalidField = null;
                        const errors = [];

                        // Only validate VISIBLE relation sections
                        const visibleSections = document.querySelectorAll('.relation-card-body:not(.d-none)');

                        visibleSections.forEach(section => {
                            const relationsGroup = section.closest('.relations_group');
                            const isActive = relationsGroup && relationsGroup.getAttribute('data-active') === '1';

                            if (!isActive) {
                                return; // Skip inactive relations
                            }

                            // Check for required relationship field
                            const relationshipField = section.querySelector('.form_relations_relationship select, .form_relations_relationship input');

                            if (relationshipField) {
                                if (!relationshipField.value || relationshipField.value.trim() === '') {
                                    isValid = false;
                                    errors.push('Relationship is required');
                                    relationshipField.classList.add('is-invalid');

                                    if (!firstInvalidField) {
                                        firstInvalidField = relationshipField;
                                    }
                                } else {
                                    relationshipField.classList.remove('is-invalid');
                                }
                            }
                        });

                        if (!isValid) {
                            e.preventDefault();
                            e.stopPropagation();

                            if (firstInvalidField) {
                                // Expand the collapsed section if needed
                                const parentCard = firstInvalidField.closest('.relation-card');
                                if (parentCard) {
                                    const formDiv = parentCard.querySelector('.relation-card-body');
                                    if (formDiv && formDiv.classList.contains('d-none')) {
                                        formDiv.classList.remove('d-none');
                                        const icon = parentCard.querySelector('.btn-edit-relation');
                                        if (icon) {
                                            icon.classList.remove('fa-caret-right');
                                            icon.classList.add('fa-caret-down');
                                        }
                                    }
                                }

                                setTimeout(() => {
                                    firstInvalidField.focus();
                                    firstInvalidField.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                }, 100);
                            }

                            alert(window.xl('Please fill in all required fields:\n') + errors.join('\n'));
                            return false;
                        }

                        console.log('Validation passed, allowing submit');
                        return true;
                    });
                } else {
                    console.error('Could not find form for validation override');
                }
            }
        }
    })();

</script>
