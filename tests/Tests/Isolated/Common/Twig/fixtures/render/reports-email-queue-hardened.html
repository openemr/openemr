<script>
function viewEmailDetails(emailId) {
    const modal = $('#emailDetailModal');
    const content = $('#emailDetailContent');

    modal.modal('show');
    content.html('<div class="text-center py-5"><i class="fas fa-spinner fa-spin fa-3x text-primary"></i></div>');

    const webroot = "\/openemr\\\";alert(1);\/\/";
    const escapeHtml = (value) => $('<div/>').text(value === null || value === undefined ? '' : String(value)).html();

    fetch(webroot + '/interface/reports/email_queue_detail.php?id=' + encodeURIComponent(String(emailId)))
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                const email = data.email;
                let statusBadge = '';
                if (String(email.error) === '1') {
                    statusBadge = '<span class="badge badge-danger"><i class="fas fa-times-circle"></i> Failed</span>';
                } else if (String(email.sent) === '1') {
                    statusBadge = '<span class="badge badge-success"><i class="fas fa-check-circle"></i> Sent</span>';
                } else {
                    statusBadge = '<span class="badge badge-warning"><i class="fas fa-clock"></i> Pending</span>';
                }

                let html = '<table class="table table-bordered">';
                html += '<tr><th width="30%">ID</th><td>#' + escapeHtml(email.id) + '</td></tr>';
                html += '<tr><th>Status</th><td>' + statusBadge + '</td></tr>';
                html += '<tr><th>Sender</th><td>' + escapeHtml(email.sender) + '</td></tr>';
                html += '<tr><th>Recipient</th><td>' + escapeHtml(email.recipient) + '</td></tr>';
                html += '<tr><th>Subject</th><td>' + escapeHtml(email.subject) + '</td></tr>';
                html += '<tr><th>Template</th><td>' + escapeHtml(email.template_name || 'None') + '</td></tr>';
                html += '<tr><th>Queued Date</th><td>' + escapeHtml(email.datetime_queued) + '</td></tr>';

                if (email.datetime_sent) {
                    html += '<tr><th>Sent Date</th><td class="text-success">' + escapeHtml(email.datetime_sent) + '</td></tr>';
                }

                if (String(email.error) === '1' && email.error_message) {
                    html += '<tr><th>Error Message</th><td class="text-danger">' + escapeHtml(email.error_message) + '</td></tr>';
                    html += '<tr><th>Error Date</th><td>' + escapeHtml(email.datetime_error) + '</td></tr>';
                }

                html += '</table>';
                content.html(html);
            } else {
                content.html('<div class="alert alert-danger">Failed to load email details</div>');
            }
        })
        .catch(error => {
            content.html('<div class="alert alert-danger">An error occurred</div>');
            console.error('Error:', error);
        });
}
</script>
