# Run BATS tests for bash scripts in the binary and flex Docker contexts.
# Ensures all scripts have valid syntax and expected structure.
#
# The release/ Dockerfile (master's "next" production build) gets its own
# bats-release job added in phase 1c when docker/release/ lands. Until then
# this file covers binary + flex only.

name: BATS Tests (binary, flex)

on:
  push:
    branches: [master]
    paths:
    - '.github/workflows/docker-test-bats.yml'
    - 'tests/bats/docker/**'
    - 'docker/binary/**'
    - 'docker/flex/**'
  pull_request:
    branches: [master]
    paths:
    - '.github/workflows/docker-test-bats.yml'
    - 'tests/bats/docker/**'
    - 'docker/binary/**'
    - 'docker/flex/**'

jobs:
  bats-binary:
    name: BATS binary
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - name: Install Bats
      run: |
        git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats-core
        /tmp/bats-core/install.sh "$HOME/bats"
        echo "$HOME/bats/bin" >> "$GITHUB_PATH"
        echo "PATH=$HOME/bats/bin:$PATH" >> "$GITHUB_ENV"
    - name: Install Bats assertion libraries
      run: |
        git clone --depth 1 https://github.com/bats-core/bats-support.git tests/bats/docker/test_helper/bats-support
        git clone --depth 1 https://github.com/bats-core/bats-assert.git tests/bats/docker/test_helper/bats-assert
    - name: Run BATS tests (binary)
      run: bats tests/bats/docker/binary/

  bats-flex:
    name: BATS flex
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
    - name: Install Bats
      run: |
        git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats-core
        /tmp/bats-core/install.sh "$HOME/bats"
        echo "$HOME/bats/bin" >> "$GITHUB_PATH"
        echo "PATH=$HOME/bats/bin:$PATH" >> "$GITHUB_ENV"
    - name: Install Bats assertion libraries
      run: |
        git clone --depth 1 https://github.com/bats-core/bats-support.git tests/bats/docker/test_helper/bats-support
        git clone --depth 1 https://github.com/bats-core/bats-assert.git tests/bats/docker/test_helper/bats-assert
    - name: Run BATS tests (flex)
      run: bats tests/bats/docker/flex/
