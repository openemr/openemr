# Auto-syncs the byte-identical file set from master into every rel branch
# listed in .github/release-targets.yml. Pairs with
# validate-byte-identical.yml (the drift canary): the canary
# detects drift, this workflow proactively closes it.
#
# Source of truth for the file set is .github/byte-identical.yml,
# the same config the canary reads. Three triggers:
#
#   1. push on master -- fires the moment a master merge changes one
#      of the byte-identical files. The script self-detects no-op if
#      nothing in FILES_ALL actually drifted (avoids the maintenance
#      burden of keeping a paths: filter in sync with the source-of-
#      truth list).
#
#   2. schedule, daily at 09:00 UTC. Picked specifically to land
#      AFTER the orchestrator-dispatched per-branch builds finish:
#      orchestrator fires at 06:00 UTC, rel-704 + rel-800 builds take
#      ~1h each, so they're done by ~07:15 UTC. 09:00 gives clear
#      headroom; opening a sync PR while a build is still in flight
#      on the same rel branch would queue two concurrent
#      docker-build-release.yml runs against the same branch.
#
#   3. workflow_dispatch -- manual reconciliation when investigating.
#
# Five cases the sync script handles for each file in FILES_ALL:
#
#   identical    no-op
#   add          file on master, missing on rel branch -> push to rel
#   update       on both, content differs               -> push master's content
#   delete       missing on master, present on rel      -> push deletion
#   both-missing in FILES_ALL but absent from both      -> warn (config bug)
#
# Token: the release App (vars.RELEASE_APP_CLIENT_ID + secrets.RELEASE_APP_PRIVATE_KEY),
# same as release-prep.yml and build-release.yml. Auto-merge is intentionally
# NOT enabled -- the sync PRs are review-gated by default so substantive
# changes (refactor of a FILES_ALL workflow, not just a dependabot bump)
# get human eyes before landing on the rel branches.
#
# Rel-branch inheritance note: future rel branches cut from master will
# inherit this workflow file (plus the script + tests it references). That
# is harmless. The push trigger above filters to master only; GitHub
# Actions' schedule: trigger only fires from the default branch (master);
# the test workflow that runs the BATS suite only fires on PRs targeting
# master. The only path that exercises a rel-branch copy is an explicit
# workflow_dispatch against that branch -- which still does the right
# thing because the apply step fetches master's copy of the script via
# `git show master:.github/scripts/sync-byte-identical.sh`. So a manual
# dispatch against rel-820 syncs rel-820 to master's FILES_ALL using
# master's logic, regardless of what version of this workflow lives on
# rel-820. The rel-branch copies are dead weight but never produce
# unexpected behavior.

name: Sync byte-identical files to rel branches

on:
  push:
    branches:
    - master
  schedule:
  - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-byte-identical
  cancel-in-progress: false

jobs:
  enumerate-rel-branches:
    if: github.repository_owner == 'openemr' && github.repository == 'openemr/openemr'
    runs-on: ubuntu-24.04
    outputs:
      branches: ${{ steps.list.outputs.branches }}
    steps:
    - uses: actions/checkout@v7
      with:
        persist-credentials: false   # this job only reads release-targets.yml; no git push
    - name: Read rel branches from release-targets.yml
      id: list
      run: |
        BRANCHES=$(yq -o=json -I=0 '[.[] | select(.branch != "master") | .branch]' .github/release-targets.yml)
        echo "Discovered rel branches: $BRANCHES"
        echo "branches=$BRANCHES" >> "$GITHUB_OUTPUT"

  sync:
    needs: enumerate-rel-branches
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJson(needs.enumerate-rel-branches.outputs.branches) }}
    steps:
    - name: Mint App token
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
        private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
        owner: openemr
        repositories: openemr
        # Narrow the minted token to just what this workflow needs (defense
        # in depth on top of the App's installation-level permissions).
        # peter-evans/create-pull-request needs contents:write to push the
        # sync branch and pull-requests:write to open/update the PR.
        permission-contents: write
        permission-pull-requests: write

    - name: Checkout rel branch
      uses: actions/checkout@v7
      with:
        ref: ${{ matrix.branch }}
        token: ${{ steps.app-token.outputs.token }}
        # peter-evans takes the token via its own input below; we don't
        # need git's persisted-credentials to survive into other steps.
        persist-credentials: false
        fetch-depth: 0

    - name: Fetch master so we can compare
      run: git fetch origin master:master

    - name: Apply master's FILES_ALL content to the rel-branch working tree
      id: apply
      env:
        OUTPUT_DIR: ${{ runner.temp }}
        TARGET_BRANCH: ${{ matrix.branch }}
      run: |
        # Classification + apply logic lives in a standalone script so the
        # 5-case behavior (identical/add/update/delete/both-missing) is
        # unit-tested by tests/bats/ci-scripts/sync-byte-identical/.
        #
        # The script lives on master only (per PR #12578 scope -- not in
        # FILES_ALL, no need to sync it to rel branches). The current
        # checkout is the rel branch, which may not have the script at
        # all. Materialize master's copy into RUNNER_TEMP and run that.
        #
        # The script sources .github/scripts/lib/glob-expand.sh at load
        # time (added in PR #12904 for glob-pattern support). Also
        # materialize that lib next to the script so the source directive
        # resolves. The lib IS in FILES_ALL so rel branches carry their
        # own copy too, but we can't use it because this workflow runs
        # against master's version of the sync logic + rel branch's
        # working tree -- reading the lib from the rel branch could
        # cross wires if the lib has diverged. Master's copy alongside
        # master's script is the safe pairing.
        git show master:.github/scripts/sync-byte-identical.sh > "$RUNNER_TEMP/sync-byte-identical.sh"
        mkdir -p "$RUNNER_TEMP/lib"
        git show master:.github/scripts/lib/glob-expand.sh > "$RUNNER_TEMP/lib/glob-expand.sh"
        bash "$RUNNER_TEMP/sync-byte-identical.sh" "$TARGET_BRANCH"

        # Translate the script's structured outputs into GitHub step outputs.
        echo "master_sha=$(cat "$OUTPUT_DIR/master-sha.txt")" >> "$GITHUB_OUTPUT"
        if [ -s "$OUTPUT_DIR/changes.txt" ]; then
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Render PR body
      if: steps.apply.outputs.has_changes == 'true'
      run: |
        cat > "$RUNNER_TEMP/pr-body.md" <<EOF
        Auto-sync of FILES_ALL changes from master @ \`${{ steps.apply.outputs.master_sha }}\`
        per the byte-identical invariant declared in
        [\`.github/byte-identical.yml\`](.github/byte-identical.yml).

        ### Changes

        \`\`\`
        $(cat "$RUNNER_TEMP/changes.txt")
        \`\`\`

        ### What to do

        Review the diff -- it should be content already reviewed on master being
        applied to this rel branch. Merge as-is unless something looks
        unexpected. Branch protection requires CI green; the byte-identical
        canary on master will turn green once this merges and re-establishes
        the invariant.

        ### Why

        The byte-identical drift canary at
        [\`.github/workflows/validate-byte-identical.yml\`](.github/workflows/validate-byte-identical.yml)
        requires the files listed in \`.github/byte-identical.yml\` to be
        character-for-character identical across master and every rel branch
        (the orchestrator dispatches the same logical build against each branch
        and expects identical semantics). This PR re-establishes that invariant
        after a master-side change.

        ---

        Auto-generated by
        [\`.github/workflows/sync-byte-identical.yml\`](.github/workflows/sync-byte-identical.yml).
        EOF

    - name: Compute add-paths input for peter-evans
      id: paths
      if: steps.apply.outputs.has_changes == 'true'
      env:
        TARGET_BRANCH: ${{ matrix.branch }}
      run: |
        # Tell peter-evans/create-pull-request to commit only the FILES_ALL
        # entries, not any other files that happen to be in the workspace
        # (e.g. composer.lock drift from a running container, or our own
        # /tmp body file if it ended up here).
        #
        # Uses master's copy of list-manifest-paths.sh, which shares the
        # same manifest-parsing + exclude-branches filtering as the sync
        # script (via lib/glob-expand.sh's read_manifest_entries +
        # filter_by_branch). Eliminates the workflow-vs-script yq
        # duplication that produced #12916 and #12920.
        #
        # lib/glob-expand.sh was already materialized to $RUNNER_TEMP/lib/
        # by the Apply step above; list-manifest-paths.sh source-loads it
        # by relative path, so RUNNER_TEMP's layout matches master's
        # (script + sibling lib/).
        git show master:.github/scripts/list-manifest-paths.sh > "$RUNNER_TEMP/list-manifest-paths.sh"
        git show master:.github/byte-identical.yml > "$RUNNER_TEMP/manifest.yml"
        # Two-step invocation (write to file, then mapfile from file)
        # rather than `mapfile < <(bash ...)` process-substitution: the
        # latter swallows the script's exit code, so a failure of
        # list-manifest-paths.sh (missing manifest, missing yq, etc.)
        # would silently yield an empty paths input to peter-evans,
        # which would then open a PR with the wrong (or missing) file
        # set. Splitting into two commands lets `set -e` propagate.
        bash "$RUNNER_TEMP/list-manifest-paths.sh" "$RUNNER_TEMP/manifest.yml" "$TARGET_BRANCH" > "$RUNNER_TEMP/paths.txt"
        mapfile -t FILES_ALL < "$RUNNER_TEMP/paths.txt"
        {
          echo "paths<<EOF"
          printf '%s\n' "${FILES_ALL[@]}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Open or update sync PR
      if: steps.apply.outputs.has_changes == 'true'
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ steps.app-token.outputs.token }}
        branch: sync-byte-identical/${{ matrix.branch }}
        base: ${{ matrix.branch }}
        title: "ci(docker): sync byte-identical files from master to ${{ matrix.branch }} (auto)"
        commit-message: |
          ci(docker): sync byte-identical files from master (${{ steps.apply.outputs.master_sha }})

          Auto-generated by .github/workflows/sync-byte-identical.yml.
        body-path: ${{ runner.temp }}/pr-body.md
        add-paths: ${{ steps.paths.outputs.paths }}
        delete-branch: false
        labels: auto-sync
