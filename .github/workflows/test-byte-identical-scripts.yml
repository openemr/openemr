# Runs the BATS test suites for the scripts under .github/scripts/.
#
# Fires on PR changes to any script, its tests, or this workflow. Fast
# suites (synthetic in-memory fixtures -- no network, no Docker), so the
# cost of running on every touch is minimal.
#
# Pattern matches docker-test-bats.yml: clone bats-core at the repo-pinned
# version (v1.13.0) and put it on PATH. No bats-support / bats-assert
# dependencies -- the tests use plain [[ ]] asserts.
#
# Not in any byte-identical set: the scripts these tests cover are
# master-only (auto-sync + the canary's logic), so the tests live on
# master only too.

name: Test byte-identical scripts

on:
  pull_request:
    branches:
    - master
    paths:
    - '.github/scripts/**'
    - 'tests/bats/ci-scripts/**'
    - '.github/workflows/test-byte-identical-scripts.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    if: github.repository_owner == 'openemr' && github.repository == 'openemr/openemr'
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Install Bats
      run: |
        git clone --depth 1 --branch v1.13.0 https://github.com/bats-core/bats-core.git /tmp/bats-core
        /tmp/bats-core/install.sh "$HOME/bats"
        echo "$HOME/bats/bin" >> "$GITHUB_PATH"

    - name: Run BATS test suites
      run: |
        bats tests/bats/ci-scripts/sync-byte-identical/
        bats tests/bats/ci-scripts/validate-byte-identical/
