# Scheduled refresh of the MYSQL_EIGHT_SUPPLEMENT constant in
# tests/PHPStan/Rules/Sql/ReservedWordRegistry.php.
#
# Compares MySQL's authoritative reserved-word list (scraped from the
# Reference Manual keywords page) against what phpmyadmin/sql-parser
# ships in its highest-numbered ContextMySql* class, and opens a pull
# request when the supplement drifts.
#
# The script runs only on the canonical master branch of the upstream
# repository; forks and non-master branches see no scheduled activity.
# Manual trigger is allowed for maintainers to dry-run or refresh
# on-demand.
#
# Failure modes:
# - MySQL's docs CDN rate-limits the runner -> the job fails with a
#   clear message and no PR is opened. Maintainer can retry via
#   workflow_dispatch or update MYSQL_EIGHT_SUPPLEMENT by hand.
# - phpmyadmin/sql-parser's Context* layout changes -> the script
#   exits non-zero. Visible in the job log.
# - Real drift -> a PR is opened against master with the updated
#   constant for human review and merge.
name: Refresh MySQL reserved-word supplement

on:
  schedule:
  - cron: '0 6 1 * *' # 06:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    # Only run from master branch on the main repository
    if: github.repository_owner == 'openemr' && github.repository == 'openemr/openemr' && github.ref == 'refs/heads/master'
    name: Refresh supplement
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup PHP and Composer
      uses: ./.github/actions/setup-php-composer
      with:
        php-version: '8.5'

    - name: Install composer dependencies
      run: composer install --no-progress --no-interaction

    - name: Run refresh script
      run: php bin/refresh-mysql-supplement.php

    - name: Open PR if supplement changed
      uses: peter-evans/create-pull-request@v7
      with:
        commit-message: |
          chore(phpstan): refresh MYSQL_EIGHT_SUPPLEMENT

          Automated update from refresh-mysql-supplement.yml. Drift was
          detected between MySQL's authoritative reserved-word list and
          what phpmyadmin/sql-parser currently ships. Review the diff
          before merging.
        branch: bot/refresh-mysql-supplement
        delete-branch: true
        title: 'chore(phpstan): refresh MYSQL_EIGHT_SUPPLEMENT'
        body: |
          Automated update from `.github/workflows/refresh-mysql-supplement.yml`.

          The script compared MySQL's reserved-word list at
          <https://dev.mysql.com/doc/refman/8.4/en/keywords.html> against
          the highest-numbered `ContextMySql*` class shipped by
          phpmyadmin/sql-parser and detected drift. The diff updates
          `MYSQL_EIGHT_SUPPLEMENT` in
          `tests/PHPStan/Rules/Sql/ReservedWordRegistry.php` to cover the
          new gap.

          If the new entries look reasonable, merge. If something looks
          wrong (e.g., MySQL renamed a docs page, a real-world column
          name is being incorrectly flagged), investigate the script
          before merging.
        labels: |
          dependencies
          phpstan
