name: OWASP Dependency Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # <--- This allows you to run it manually from the UI

jobs:
  depcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        uses: owasp/dependency-check-action@1.1.0
        with:
          project: 'MyProjectName'
          path: '.'
          format: 'HTML'
          out: 'reports'
          args: >
            --failOnCVSS 7

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: DepCheck-Report
          path: reports
