name: Release Permissions Check

# Manual workflow_dispatch only. Mints the release App's installation
# token and probes every operation the conductor performs, failing
# loudly with the missing scope name. Run after installing the App on
# this repo and the consumer repos, and after rotating secrets.
#
# Per openemr/openemr-devops#664.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  probe:
    name: Probe release-app permissions (${{ matrix.php-version }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      matrix:
        php-version:
        - '8.2'
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Mint App token
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ secrets.RELEASE_APP_ID }}
        private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

    - name: Setup PHP and Composer
      uses: ./.github/actions/setup-php-composer
      with:
        php-version: ${{ matrix.php-version }}

    - name: Install conductor sub-package deps
      working-directory: tools/release
      run: composer install --no-interaction --prefer-dist --no-progress

    - name: Probe installation membership
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        REPO: ${{ github.repository }}
      run: |
        if ! gh api /installation/repositories --jq '.repositories[].full_name' | grep -Fxq "${REPO}"; then
          printf 'FAIL: release App is not installed on %s\n' "${REPO}" >&2
          exit 1
        fi
        printf 'OK: release App is installed on %s\n' "${REPO}"

    - name: Probe contents:write (create + delete throwaway branch)
      id: probe-contents
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        REPO: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
      run: |
        branch="release-permissions-check/${RUN_ID}"
        printf 'branch=%s\n' "${branch}" >> "$GITHUB_OUTPUT"
        sha="$(gh api "repos/${REPO}/git/ref/heads/$(gh api "repos/${REPO}" --jq '.default_branch')" --jq '.object.sha')"
        if ! gh api -X POST "repos/${REPO}/git/refs" -f "ref=refs/heads/${branch}" -f "sha=${sha}" >/dev/null; then
          printf 'FAIL: contents:write missing (cannot create branch)\n' >&2
          exit 1
        fi
        printf 'OK: created throwaway branch %s\n' "${branch}"

    - name: Probe pull-requests:write (open + close draft PR)
      id: probe-prs
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        REPO: ${{ github.repository }}
        BRANCH: ${{ steps.probe-contents.outputs.branch }}
      run: |
        default_branch="$(gh api "repos/${REPO}" --jq '.default_branch')"
        body='Permissions probe — auto-closed.'
        pr_number="$(gh api -X POST "repos/${REPO}/pulls" -f "title=release-permissions-check probe" -f "head=${BRANCH}" -f "base=${default_branch}" -f "body=${body}" -F "draft=true" --jq '.number' 2>/dev/null || true)"
        if [[ -z "${pr_number}" ]]; then
          printf 'FAIL: pull-requests:write missing (cannot open draft PR)\n' >&2
          exit 1
        fi
        printf 'pr_number=%s\n' "${pr_number}" >> "$GITHUB_OUTPUT"
        if ! gh api -X PATCH "repos/${REPO}/pulls/${pr_number}" -f 'state=closed' >/dev/null; then
          printf 'FAIL: pull-requests:write missing (cannot close draft PR)\n' >&2
          exit 1
        fi
        printf 'OK: opened and closed draft PR #%s\n' "${pr_number}"

    - name: Probe annotated tag creation (create + delete throwaway tag)
      id: probe-tag
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        REPO: ${{ github.repository }}
        RUN_ID: ${{ github.run_id }}
        BRANCH: ${{ steps.probe-contents.outputs.branch }}
      run: |
        tag_name="release-permissions-check-${RUN_ID}"
        sha="$(gh api "repos/${REPO}/git/ref/heads/${BRANCH}" --jq '.object.sha')"
        date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        message="release-permissions-check probe ${RUN_ID}"
        tag_sha="$(gh api -X POST "repos/${REPO}/git/tags" -f "tag=${tag_name}" -f "message=${message}" -f "object=${sha}" -f "type=commit" -F "tagger[name]=openemr-release-bot" -F "tagger[email]=release-bot@openemr.invalid" -F "tagger[date]=${date}" --jq '.sha')"
        if [[ -z "${tag_sha}" ]]; then
          printf 'FAIL: cannot create annotated tag object\n' >&2
          exit 1
        fi
        if ! gh api -X POST "repos/${REPO}/git/refs" -f "ref=refs/tags/${tag_name}" -f "sha=${tag_sha}" >/dev/null; then
          printf 'FAIL: cannot create tag ref\n' >&2
          exit 1
        fi
        printf 'tag_name=%s\n' "${tag_name}" >> "$GITHUB_OUTPUT"
        printf 'OK: created annotated tag %s\n' "${tag_name}"

    - name: Probe cross-repo dispatch (release-permissions-probe)
      env:
        RELEASE_APP_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        php tools/release/bin/dispatch.php \
          --probe \
          --event=release-permissions-probe \
          --target-repos=openemr/openemr-devops,openemr/website-openemr \
          --sha='${{ github.sha }}' \
          --actor=openemr-release-bot \
          || { printf 'FAIL: cross-repo dispatch failed\n' >&2; exit 1; }
        printf 'OK: dispatched release-permissions-probe to consumer repos\n'

    - name: Cleanup throwaway tag
      if: always() && steps.probe-tag.outputs.tag_name != ''
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        REPO: ${{ github.repository }}
        TAG: ${{ steps.probe-tag.outputs.tag_name }}
      run: |
        gh api -X DELETE "repos/${REPO}/git/refs/tags/${TAG}" || true

    - name: Cleanup throwaway branch
      if: always() && steps.probe-contents.outputs.branch != ''
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        REPO: ${{ github.repository }}
        BRANCH: ${{ steps.probe-contents.outputs.branch }}
      run: |
        gh api -X DELETE "repos/${REPO}/git/refs/heads/${BRANCH}" || true
