# PR validation for the release Dockerfile.
#
# Calls docker-test-core.yml which discovers all docker/<variant>/Dockerfile
# subdirectories and runs the production test path against each. Under
# openemr core's flatter layout that means flex + binary + release; the
# matrix is built dynamically inside docker-test-core.yml.
#
# Triggers on changes to docker/release/** since that's the Dockerfile this
# workflow primarily exists to validate. Changes to flex / binary fire their
# own targeted test-flex-*.yml and BATS workflows respectively.
#
#  - is_production_docker: true  -- triggers the production-mode test path
#    inside docker-test-core.yml (vs the dev-mode path used by the
#    docker-test-flex-*.yml callers).
#  - production_coverage_openemr_version: 'release' -- variant to enable
#    coverage instrumentation on; only one variant gets kcov per run.
#
# No `branches:` filter on the triggers. Branch scoping is implicit -- the
# workflow file lives on master + every rel-*; push events use the workflow
# at the pushed commit, pull_request events use the workflow at the PR's
# base ref. So each branch's copy of THIS file fires only for events on
# its own branch, no explicit filter needed. Dropping the per-branch filter
# is what lets this file join the byte-identical FILES_ALL set in
# docker-validate-byte-identical.yml -- one canonical file across master
# and every current and future rel-*, no edit needed at branch-cut.

name: Docker release test

on:
  push:
    paths:
    - '.github/workflows/docker-test-release.yml'
    - 'docker/release/**'
    - '.github/actions/test-actions-core/action.yml'
    - '.github/workflows/docker-test-core.yml'
  pull_request:
    paths:
    - '.github/workflows/docker-test-release.yml'
    - 'docker/release/**'
    - '.github/actions/test-actions-core/action.yml'
    - '.github/workflows/docker-test-core.yml'

jobs:
  build:
    uses: ./.github/workflows/docker-test-core.yml
    with:
      is_production_docker: true
      production_coverage_openemr_version: 'release'
