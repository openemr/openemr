# Enforces backticked column definitions in sql/database.sql.
#
# The install schema's CREATE TABLE blocks should backtick every column
# name for consistency with the rest of the file. Historically the `ccda`
# and `recent_patients` tables declared their columns bare; this PR
# cleaned them up and adds this check so future additions stay uniform.
#
# Scope is intentionally narrow: only sql/database.sql. Upgrade SQL files
# are append-only history and aren't held to the same convention.
name: Database Style

on:
  pull_request:
    branches:
    - master
    - rel-*
    paths:
    - sql/database.sql

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.number || github.run_id }}
  cancel-in-progress: true

jobs:
  backticked-columns:
    name: Backticked column definitions
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6

    - name: Check column definitions are backticked
      run: |
        # Match lines that look like a column definition where the column
        # name is NOT backticked, i.e. start-of-line whitespace, then a
        # bare identifier, then a built-in MySQL type keyword.
        violations=$(grep -nE \
          "^\s*[a-zA-Z_][a-zA-Z0-9_]*\s+(INT|VARCHAR|TINYINT|BIGINT|TEXT|MEDIUMINT|SMALLINT|CHAR|DATE|DATETIME|TIMESTAMP|DECIMAL|FLOAT|DOUBLE|BOOL|BLOB|ENUM|SET|LONGTEXT|LONGBLOB)\b" \
          sql/database.sql || true)
        if [[ -z "$violations" ]]; then
          {
            echo '## ✅ All column definitions are backticked'
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        {
          echo '## ❌ Un-backticked column definitions in sql/database.sql'
          echo
          echo 'All column definitions in `sql/database.sql` must backtick the column name'
          echo 'for consistency with the rest of the schema. Wrap each violation:'
          echo
          echo '```sql'
          echo '`col_name` <TYPE>'
          echo '```'
          echo
          echo '### Offending lines'
          echo
          echo '```'
          echo "$violations"
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"
        echo "::error::un-backticked column definitions in sql/database.sql"
        echo "$violations"
        exit 1
