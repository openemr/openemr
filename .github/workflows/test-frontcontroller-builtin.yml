        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: xdebug

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress
        working-directory: .

