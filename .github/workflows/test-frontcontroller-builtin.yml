name: Test Front Controller (php -S)

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.suite }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        suite:
          - api
          - certification
          - common
          - controllers
          - e2e
          - email
          - fixtures
          - services
          - unit
          - valdiators
          # Needs a node thing
          # - ECQM

    # services:
