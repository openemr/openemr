      #   run: |
      #     php -S 0.0.0.0:8080 -t . public/index.php \
      #       > "${RUNNER_TEMP}/php-server.out.log" \
      #       2> "${RUNNER_TEMP}/php-server.err.log" &

      # - name: Wait for webserver
      #   run: |
      #     curl --retry-connrefused --retry 30 --retry-delay 1 \
      #          --fail --silent --show-error \
      #          -o /dev/null http://127.0.0.1:8080/

      - name: Run ${{ matrix.suite }} tests
        working-directory: .
        env:
          OPENEMR_BASE_URL_API: http://localhost:8080
          SELENIUM_BASE_URL: http://localhost:8080
          SELENIUM_HOST: localhost
          SELENIUM_USE_GRID: "true"
        run: |
          mkdir -p /tmp/xdebug
          cat > /tmp/trace_start.php <<'PHP'
          <?php
          if (function_exists('xdebug_start_trace')) {
              xdebug_start_trace('/tmp/xdebug/phpunit');
          }
          PHP
          XDEBUG_MODE=trace php \
              -d memory_limit=4G \
              -d xdebug.mode=trace \
              -d xdebug.trace_format=0 \
              -d xdebug.collect_params=1 \
              -d xdebug.use_compression=0 \
              -d auto_prepend_file=/tmp/trace_start.php \
              vendor/bin/phpunit \
                --testsuite ${{ matrix.suite }} \
                --bootstrap vendor/autoload.php \
                --log-junit junit-${{ matrix.suite }}.xml
          echo "phpunit_exit=$?"
          echo "--- /tmp/xdebug listing ---"
          ls -la /tmp/xdebug/ || true
          TRACE=/tmp/xdebug/phpunit.xt
          if [ -f "$TRACE" ]; then
            echo "--- exit/die calls in $TRACE ---"
            grep -nE -- '-> (exit|die)\(' "$TRACE" || true
            echo "--- tail of $TRACE ---"
            tail -n 120 "$TRACE" || true
          fi

      - name: Upload xdebug trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xdebug-trace-${{ matrix.suite }}
          path: /tmp/xdebug/phpunit.xt
          if-no-files-found: ignore

