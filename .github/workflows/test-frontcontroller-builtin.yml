name: Test Front Controller (php -S)

on:
  pull_request:
    # paths:
    #   - 'docker/frontcontroller/**'
    #   - 'config/**'
    #   - 'public/index.php'
    #   - '.github/workflows/test-frontcontroller.yml'
  workflow_dispatch:

env:
  ENVIRONMENT: ci

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.suite }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        php:
          - 8.2
          - 8.5
        suite:
          - api
          # - e2e
    # defaults:
    #   run:
    #     working-directory: docker/frontcontroller

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: ci
          MYSQL_PASSWORD: topsecret
          MYSQL_DATABASE: openemr_test
        ports:
          - 3306:3306

      selenium:
        image: selenium/standalone-chrome:latest
        ports:
          - 4444:4444
        options: --shm-size=2gb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: ./.github/actions/setup-php-composer
        with:
          php-version: ${{ matrix.php }}

      - name: Run CLI installer
        run: ./cli install
            --db-root-user=root
            --db-root-password=root
            --db-host=127.0.0.1
            --db-port=3306
            --db-user=ci
            --db-password=topsecret
            --db-name=openemr_test
            --oe-admin-username=admin
            --oe-admin-password=pass
            --no-interaction
            -vvv

      - name: Configure globals for API
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -proot openemr_test -e "
            INSERT INTO product_registration (opt_out) VALUES (1);
            UPDATE globals SET gl_value = 1 WHERE gl_name = 'rest_api';
            UPDATE globals SET gl_value = 1 WHERE gl_name = 'rest_fhir_api';
            UPDATE globals SET gl_value = 1 WHERE gl_name = 'rest_portal_api';
            UPDATE globals SET gl_value = 3 WHERE gl_name = 'oauth_password_grant';
            UPDATE globals SET gl_value = 1 WHERE gl_name = 'rest_system_scopes_api';
          "

      - name: Start server (bg)
        env:
          ENVIRONMENT: ci
        run: |
          php -S 0.0.0.0:8080 -t . public/index.php \
            > "${RUNNER_TEMP}/php-server.out.log" \
            2> "${RUNNER_TEMP}/php-server.err.log" &

      - name: Wait for webserver
        run: |
          curl --retry-connrefused --retry 30 --retry-delay 1 \
               --fail --silent --show-error \
               -o /dev/null http://127.0.0.1:8080/

      - name: Run ${{ matrix.suite }} tests
        working-directory: .
        env:
          OPENEMR_BASE_URL_API: http://localhost:8080
          SELENIUM_BASE_URL: http://localhost:8080
          SELENIUM_HOST: localhost
          SELENIUM_USE_GRID: "true"
        run: php
            -d memory_limit=4G
            vendor/bin/phpunit
            --testsuite ${{ matrix.suite }}
            --log-junit junit-${{ matrix.suite }}.xml

      - name: Show server stdout
        if: always()
        run: cat "${RUNNER_TEMP}/php-server.out.log"

      - name: Show server stderr
        if: always()
        run: cat "${RUNNER_TEMP}/php-server.err.log"

      # - name: Upload test results
      #   if: always()
      #   uses: actions/upload-artifact@v7
      #   with:
      #     name: junit-${{ matrix.webserver }}-${{ matrix.suite }}
      #     path: junit-*.xml
      #     if-no-files-found: ignore

      # - name: Show logs on failure
      #   if: failure()
      #   run: docker compose logs
