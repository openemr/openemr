name: Release Prep Conductor

# Long-lived release-prep PR pattern (release-please-shaped) for the
# openemr/openemr conductor in the three-PR release-automation flow
# (openemr/openemr-devops#664). On every push to a rel-* branch, runs
# the mechanical edits and force-pushes them to release-prep/<rel-branch>,
# opening or updating a draft PR. On merge of that PR, creates the
# annotated release tag and dispatches openemr-tag to the consumer
# repos.

on:
  push:
    branches:
    - 'rel-*'
    paths-ignore:
    - 'docs/**'
  pull_request:
    types:
    - closed
    branches:
    - 'rel-*'
  workflow_dispatch:
    inputs:
      target-version:
        description: 'Target release version (MAJOR.MINOR.PATCH)'
        required: true
        type: string
      branch:
        description: 'Release branch (rel-NNN)'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  # Serialise runs per release branch so a fast follow-up push doesn't
  # race the previous run's force-push.
  group: ${{ github.workflow }}-${{ github.event.pull_request.base.ref || github.ref }}
  cancel-in-progress: false

jobs:
  prep:
    name: Generate release-prep PR (${{ matrix.php-version }})
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      matrix:
        # The conductor itself is tooling (only runs on CI) so per OCE
        # conventions it tracks the latest stable PHP, not the openemr
        # application floor. The release-prep mutators only need to
        # parse application code, not execute it on this PHP version.
        php-version:
        - '8.5'
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Mint App token
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ secrets.RELEASE_APP_ID }}
        private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

    - name: Setup PHP and Composer
      uses: ./.github/actions/setup-php-composer
      with:
        php-version: ${{ matrix.php-version }}

    - name: Resolve target version and branch
      id: resolve
      env:
        EVENT_NAME: ${{ github.event_name }}
        REF: ${{ github.ref }}
        INPUT_BRANCH: ${{ inputs.branch }}
        INPUT_VERSION: ${{ inputs.target-version }}
      run: |
        case "${EVENT_NAME}" in
          workflow_dispatch)
            echo "branch=${INPUT_BRANCH}"
            echo "version=${INPUT_VERSION}"
            ;;
          *)
            branch="${REF#refs/heads/}"
            echo "branch=${branch}"
            printf 'version='
            php tools/release/bin/branch-to-version.php "${branch}"
            ;;
        esac >> "$GITHUB_OUTPUT"

    - name: Render PR body
      id: pr-body
      run: |
        {
          echo 'body<<EOF'
          php tools/release/bin/render-pr-body.php "${{ steps.resolve.outputs.version }}"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Run release-prep mutators
      run: |
        php bin/console openemr:release-prep \
          --target-version="${{ steps.resolve.outputs.version }}" \
          --scope=rel \
          --skip-globals

    # Open/update the long-lived release-prep PR via peter-evans/create-pull-request,
    # which handles the diff detection, branch force-push, and PR open-or-update
    # in one step. When there is no diff this is a no-op.
    - name: Create or update release-prep PR
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ steps.app-token.outputs.token }}
        branch: release-prep/${{ steps.resolve.outputs.branch }}
        base: ${{ steps.resolve.outputs.branch }}
        title: 'release-prep: ${{ steps.resolve.outputs.version }}'
        body: ${{ steps.pr-body.outputs.body }}
        commit-message: 'release-prep: ${{ steps.resolve.outputs.version }}'
        author: 'openemr-release-bot <release-bot@openemr.invalid>'
        committer: 'openemr-release-bot <release-bot@openemr.invalid>'
        draft: true
        delete-branch: false

    - name: Dispatch rel-cut / rel-update to consumers
      env:
        RELEASE_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        rel_branch='${{ steps.resolve.outputs.branch }}'
        version='${{ steps.resolve.outputs.version }}'
        prev_release="$(php tools/release/bin/derive-prev-release.php "${version}")"
        # First push to a new rel-branch is rel-cut; subsequent pushes are rel-update.
        # The conductor distinguishes by checking whether the upstream release-prep
        # branch already exists; gh exit code 0 = exists.
        if gh api "repos/${{ github.repository }}/branches/release-prep/${rel_branch}" >/dev/null 2>&1; then
          event='openemr-rel-update'
        else
          event='openemr-rel-cut'
        fi
        php tools/release/bin/dispatch.php \
          --event="${event}" \
          --sha="${{ github.sha }}" \
          --actor='openemr-release-bot' \
          --branch="${rel_branch}" \
          --version="${version}" \
          --prev-release="${prev_release}"

  finalize:
    name: Tag + dispatch on release-prep merge
    if: |
      github.event_name == 'pull_request'
      && github.event.pull_request.merged == true
      && startsWith(github.event.pull_request.head.ref, 'release-prep/')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      matrix:
        # Same rationale as the prep job above.
        php-version:
        - '8.5'
    steps:
    - name: Checkout merge commit
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.merge_commit_sha }}
        fetch-depth: 0

    - name: Mint App token
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ secrets.RELEASE_APP_ID }}
        private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

    - name: Setup PHP and Composer
      uses: ./.github/actions/setup-php-composer
      with:
        php-version: ${{ matrix.php-version }}

    - name: Resolve version from base branch
      id: resolve
      env:
        BASE_REF: ${{ github.event.pull_request.base.ref }}
      run: |
        {
          echo "branch=${BASE_REF}"
          printf 'version='
          php tools/release/bin/branch-to-version.php "${BASE_REF}"
        } >> "$GITHUB_OUTPUT"

    - name: Create annotated tag
      env:
        RELEASE_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        REPO: ${{ github.repository }}
        MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        PR_URL: ${{ github.event.pull_request.html_url }}
      run: |
        php tools/release/bin/create-tag.php \
          --repo="${REPO}" \
          --version='${{ steps.resolve.outputs.version }}' \
          --commit-sha="${MERGE_SHA}" \
          --conductor-pr-url="${PR_URL}"

    - name: Dispatch openemr-tag to consumers
      env:
        RELEASE_APP_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        version='${{ steps.resolve.outputs.version }}'
        rel_branch='${{ steps.resolve.outputs.branch }}'
        tag_name="v${version//./_}"
        php tools/release/bin/dispatch.php \
          --event=openemr-tag \
          --sha='${{ github.event.pull_request.merge_commit_sha }}' \
          --actor='openemr-release-bot' \
          --branch="${rel_branch}" \
          --version="${version}" \
          --tag="${tag_name}"
