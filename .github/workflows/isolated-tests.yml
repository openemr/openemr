name: Isolated Tests

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master

jobs:
  isolated-tests:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        php-version:
        - '8.2'
        - '8.3'
        - '8.4'

    name: PHP ${{ matrix.php-version }} - Isolated Tests

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        coverage: xdebug
        php-version: ${{ matrix.php-version }}

    - name: Get composer cache directory
      id: composer-cache
      run: |
        {
          printf 'dir='
          composer config cache-files-dir
        } >> $GITHUB_OUTPUT

    - name: Composer Cache
      uses: actions/cache/restore@v4
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ matrix.configurations.php }}-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-${{ matrix.configurations.php }}-
          ${{ runner.os }}-composer-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Run isolated tests with coverage
      run: vendor/bin/phpunit -c phpunit-isolated.xml --coverage-clover=clover.xml --coverage-html htmlcov --testdox

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-isolated-tests-php-${{ matrix.php-version }}
        path: |
          clover.xml
          htmlcov/
