name: Patch-Prep Automation

# Fires when a maintainer pushes a $v_patch increment to version.php on a
# rel-* branch (e.g., rel-810 going 8.1.0 → 8.1.1-dev), or via manual
# dispatch for recovery. Opens two coordinated ready-for-review PRs (not
# drafts — patch-prep PRs should land fast, paving the way for the new
# dev cycle): one on the rel branch (rel-side mutations) and one on
# master (next-patch SQL bridge + release-targets row insert + docker
# upgrade scaffold). See docs/release-mechanism-gaps.md and
# docs/release-mechanism-migration-from-devops.md (workstream 3 phase B).

on:
  push:
    branches:
    - 'rel-*'
    paths:
    - 'version.php'
  workflow_dispatch:
    inputs:
      rel-branch:
        description: 'rel-NNN0 branch name (e.g., rel-810). Required when running manually.'
        type: string
        required: true
      target-version:
        description: 'New patch version (MAJOR.MINOR.PATCH, e.g., 8.1.1).'
        type: string
        required: true
      prev-version:
        description: 'Prior patch version (MAJOR.MINOR.PATCH, e.g., 8.1.0).'
        type: string
        required: true

permissions:
  contents: read

concurrency:
  # Serialise per rel branch — concurrent patch-prep events on the same
  # branch must queue. Different rel branches don't interact, so the
  # group key includes the rel branch name.
  group: ${{ github.workflow }}-${{ inputs.rel-branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  patch-prep:
    name: Open rel-side + master-side patch-prep PRs
    if: |
      github.repository == 'openemr/openemr'
      && (
        (github.event_name == 'push'
         && startsWith(github.ref, 'refs/heads/rel-'))
        || github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    strategy:
      matrix:
        php-version:
        - '8.5'
    steps:
    - name: Mint App token
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
        private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
        # Scope to this repo only — patch-prep doesn't dispatch to
        # consumers (downstream rel-update dispatch fires on the
        # release-prep PR cycle for the new patch instead).
        owner: ${{ github.repository_owner }}
        repositories: openemr

    - name: Resolve rel-branch + target-version + prev-version
      id: resolve
      env:
        EVENT_NAME: ${{ github.event_name }}
        REF_NAME: ${{ github.ref_name }}
        EVENT_BEFORE: ${{ github.event.before }}
        EVENT_AFTER: ${{ github.event.after }}
        REPO: ${{ github.repository }}
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        INPUT_REL_BRANCH: ${{ inputs.rel-branch }}
        INPUT_TARGET_VERSION: ${{ inputs.target-version }}
        INPUT_PREV_VERSION: ${{ inputs.prev-version }}
      run: |
        set -euo pipefail
        # Shared with the push path below — populates MAJOR/MINOR/PATCH/TAG
        # globals from a version.php blob.
        parse_version_php() {
          local raw="$1" var
          for var in v_major v_minor v_patch v_tag; do
            local value
            value="$(printf '%s\n' "${raw}" | grep -oP "^\\\$${var}\\s*=\\s*'\\K[^']*" | head -n1 || true)"
            case "${var}" in
              v_major) MAJOR="${value}" ;;
              v_minor) MINOR="${value}" ;;
              v_patch) PATCH="${value}" ;;
              v_tag)   TAG="${value}" ;;
            esac
          done
        }
        case "${EVENT_NAME}" in
          workflow_dispatch)
            rel_branch="${INPUT_REL_BRANCH}"
            target_version="${INPUT_TARGET_VERSION}"
            prev_version="${INPUT_PREV_VERSION}"
            if ! [[ "${rel_branch}" =~ ^rel-[0-9]+$ ]]; then
              echo "::error::rel-branch '${rel_branch}' does not match rel-<digits>"
              exit 1
            fi
            if ! [[ "${target_version}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "::error::target-version '${target_version}' must be MAJOR.MINOR.PATCH"
              exit 1
            fi
            target_major="${BASH_REMATCH[1]}"
            target_minor="${BASH_REMATCH[2]}"
            target_patch="${BASH_REMATCH[3]}"
            if ! [[ "${prev_version}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "::error::prev-version '${prev_version}' must be MAJOR.MINOR.PATCH"
              exit 1
            fi
            prev_major="${BASH_REMATCH[1]}"
            prev_minor="${BASH_REMATCH[2]}"
            prev_patch="${BASH_REMATCH[3]}"
            # Semantic invariants — mirror the push-path gates so a mistyped
            # manual recovery can't scaffold files for the wrong patch.
            if [ "${prev_major}" != "${target_major}" ] || [ "${prev_minor}" != "${target_minor}" ]; then
              echo "::error::prev-version '${prev_version}' major/minor must match target '${target_version}'"
              exit 1
            fi
            if [ "$((target_patch - 1))" != "${prev_patch}" ]; then
              echo "::error::prev-version patch '${prev_patch}' must equal target patch minus 1 (${target_patch} - 1 = $((target_patch - 1)))"
              exit 1
            fi
            # Verify rel-branch's version.php actually reads <target>-dev at
            # HEAD; otherwise the mutators will operate on the wrong state.
            if ! rel_head_b64="$(gh api "repos/${REPO}/contents/version.php?ref=${rel_branch}" --jq '.content' 2>/dev/null)"; then
              echo "::error::could not fetch version.php from ${rel_branch}"
              exit 1
            fi
            rel_head_raw="$(printf '%s' "${rel_head_b64}" | base64 -d)"
            parse_version_php "${rel_head_raw}"
            if [ "${MAJOR}.${MINOR}.${PATCH}" != "${target_version}" ] || [ "${TAG}" != '-dev' ]; then
              echo "::error::rel-branch ${rel_branch} version.php is '${MAJOR}.${MINOR}.${PATCH}${TAG}', expected '${target_version}-dev'"
              exit 1
            fi
            should_run='true'
            ;;
          *)
            rel_branch="${REF_NAME}"
            if ! [[ "${rel_branch}" =~ ^rel-[0-9]+$ ]]; then
              echo "Branch '${rel_branch}' does not match rel-<digits>; nothing to do."
              echo "should-run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # New-branch push: `before` is all-zeros. Branch-cut handles
            # that lifecycle event; bail out cleanly.
            if [ "${EVENT_BEFORE}" = '0000000000000000000000000000000000000000' ]; then
              echo "New branch creation event (before=all-zeros); branch-cut owns this, skipping."
              echo "should-run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # Fetch version.php contents at before + after via the API so
            # we can compare them without checking out the whole tree.
            # Silently dropping API errors here is intentional — under
            # `set -euo pipefail` a 404 (e.g., the push is the commit that
            # first adds version.php on a rel branch) or transient API
            # blip would crash the whole step. The workflow has many
            # other guards downstream; the goal here is to never crash
            # the resolver on a non-event.
            if ! before_b64="$(gh api "repos/${REPO}/contents/version.php?ref=${EVENT_BEFORE}" --jq '.content' 2>/dev/null)" \
               || ! after_b64="$(gh api "repos/${REPO}/contents/version.php?ref=${EVENT_AFTER}" --jq '.content' 2>/dev/null)"; then
              echo "Could not fetch version.php at before or after ref; skipping (likely first-time-adds version.php or transient API issue)."
              echo "should-run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            before_raw="$(printf '%s' "${before_b64}" | base64 -d)"
            after_raw="$(printf '%s' "${after_b64}" | base64 -d)"
            parse_version_php "${before_raw}"
            before_major="${MAJOR}"; before_minor="${MINOR}"; before_patch="${PATCH}"; before_tag="${TAG}"
            parse_version_php "${after_raw}"
            after_major="${MAJOR}"; after_minor="${MINOR}"; after_patch="${PATCH}"; after_tag="${TAG}"
            if [ -z "${after_major}" ] || [ -z "${after_minor}" ] || [ -z "${after_patch}" ]; then
              echo "::warning::Could not parse \$v_major/\$v_minor/\$v_patch from after-state version.php; skipping."
              echo "should-run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ -z "${before_patch}" ]; then
              echo "Could not parse before-state \$v_patch; skipping (treat as no-op)."
              echo "should-run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # Gate: $v_patch must have strictly increased.
            if ! [ "${after_patch}" -gt "${before_patch}" ] 2>/dev/null; then
              echo "\$v_patch did not increase (before=${before_patch} after=${after_patch}); not our event."
              echo "should-run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # Gate: after-state must be -dev. Release-prep mid-flight
            # strips -dev to ship; that's not our event.
            if [ "${after_tag}" != '-dev' ]; then
              echo "after \$v_tag is '${after_tag}', not '-dev'; not a dev-cycle entry, skipping."
              echo "should-run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # Gate: major/minor must be unchanged. A change crossing minor
            # boundaries isn't a patch bump — it's a different lifecycle
            # event (branch-cut or something stranger). Skip cleanly.
            if [ "${before_major}" != "${after_major}" ] || [ "${before_minor}" != "${after_minor}" ]; then
              echo "major/minor changed (before=${before_major}.${before_minor}, after=${after_major}.${after_minor}); not a patch-prep event."
              echo "should-run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            # Gate: before-state must have been -dev too. A non-dev -> -dev
            # transition would mean we're re-entering dev right after a
            # ship — that's a fresh patch dev cycle, but the before-state
            # shape suggests something pushed release-prep finalization
            # (-dev stripped) immediately followed by the patch bump in a
            # single push; let a human inspect rather than auto-firing.
            if [ "${before_tag}" != '-dev' ]; then
              echo "before \$v_tag is '${before_tag}', not '-dev'; unusual transition, skipping."
              echo "should-run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            target_version="${after_major}.${after_minor}.${after_patch}"
            prev_version="${after_major}.${after_minor}.${before_patch}"
            should_run='true'
            ;;
        esac
        echo "Resolved: rel_branch=${rel_branch} target=${target_version} prev=${prev_version}"
        {
          echo "should-run=${should_run}"
          echo "rel-branch=${rel_branch}"
          echo "target-version=${target_version}"
          echo "prev-version=${prev_version}"
        } >> "$GITHUB_OUTPUT"

    # Initial checkout at the workflow's default working directory so
    # `./.github/actions/setup-php-composer` resolves (composite actions
    # must live under GITHUB_WORKSPACE before they can be referenced).
    # The mutator runs use the per-side checkouts below; this checkout
    # is just for the composite action source.
    - name: Checkout master (for composite action source)
      if: steps.resolve.outputs.should-run == 'true'
      uses: actions/checkout@v7
      with:
        ref: master
        fetch-depth: 1

    - name: Setup PHP and Composer (shared)
      if: steps.resolve.outputs.should-run == 'true'
      uses: ./.github/actions/setup-php-composer
      with:
        php-version: ${{ matrix.php-version }}
        skip-composer-install: 'true'

    # --- Rel-side -----------------------------------------------------
    - name: Checkout the rel branch
      if: steps.resolve.outputs.should-run == 'true'
      uses: actions/checkout@v7
      with:
        ref: ${{ steps.resolve.outputs.rel-branch }}
        path: rel-checkout
        token: ${{ steps.app-token.outputs.token }}
        fetch-depth: 0

    - name: Install Composer dependencies (rel-checkout)
      if: steps.resolve.outputs.should-run == 'true'
      working-directory: rel-checkout
      shell: bash
      run: composer install --prefer-dist --no-progress --no-interaction

    - name: Run patch-prep mutators (rel side)
      if: steps.resolve.outputs.should-run == 'true'
      working-directory: rel-checkout
      env:
        VERSION: ${{ steps.resolve.outputs.target-version }}
        REL_BRANCH: ${{ steps.resolve.outputs.rel-branch }}
        PREV_VERSION: ${{ steps.resolve.outputs.prev-version }}
      run: |
        php bin/console openemr:patch-prep \
          --target-version="${VERSION}" \
          --rel-branch="${REL_BRANCH}" \
          --prev-version="${PREV_VERSION}" \
          --side=rel

    - name: Render rel-side PR body
      id: rel-pr-body
      if: steps.resolve.outputs.should-run == 'true'
      working-directory: rel-checkout
      env:
        VERSION: ${{ steps.resolve.outputs.target-version }}
        REL_BRANCH: ${{ steps.resolve.outputs.rel-branch }}
        PREV_VERSION: ${{ steps.resolve.outputs.prev-version }}
      run: |
        {
          echo 'body<<EOF'
          php tools/release/bin/render-pr-body.php "${VERSION}" \
            --template=.github/PULL_REQUEST_TEMPLATE/patch-prep-rel.md \
            --rel-branch="${REL_BRANCH}" \
            --prev-version="${PREV_VERSION}"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Open rel-side patch-prep PR
      if: steps.resolve.outputs.should-run == 'true'
      uses: peter-evans/create-pull-request@v8
      with:
        path: rel-checkout
        token: ${{ steps.app-token.outputs.token }}
        branch: patch-prep/${{ steps.resolve.outputs.rel-branch }}
        base: ${{ steps.resolve.outputs.rel-branch }}
        title: 'chore(release): patch-prep ${{ steps.resolve.outputs.rel-branch }} ${{ steps.resolve.outputs.target-version }} (rel-side)'
        body: ${{ steps.rel-pr-body.outputs.body }}
        commit-message: 'chore(release): patch-prep ${{ steps.resolve.outputs.rel-branch }} ${{ steps.resolve.outputs.target-version }} (rel-side)'
        author: 'openemr-release-bot <release-bot@openemr.invalid>'
        committer: 'openemr-release-bot <release-bot@openemr.invalid>'
        draft: false
        delete-branch: false

    # --- Master-side --------------------------------------------------
    - name: Checkout master
      if: steps.resolve.outputs.should-run == 'true'
      uses: actions/checkout@v7
      with:
        ref: master
        path: master-checkout
        token: ${{ steps.app-token.outputs.token }}
        fetch-depth: 0

    - name: Install Composer dependencies (master-checkout)
      if: steps.resolve.outputs.should-run == 'true'
      working-directory: master-checkout
      shell: bash
      run: composer install --prefer-dist --no-progress --no-interaction

    - name: Run patch-prep mutators (master side)
      if: steps.resolve.outputs.should-run == 'true'
      working-directory: master-checkout
      env:
        VERSION: ${{ steps.resolve.outputs.target-version }}
        REL_BRANCH: ${{ steps.resolve.outputs.rel-branch }}
        PREV_VERSION: ${{ steps.resolve.outputs.prev-version }}
      run: |
        php bin/console openemr:patch-prep \
          --target-version="${VERSION}" \
          --rel-branch="${REL_BRANCH}" \
          --prev-version="${PREV_VERSION}" \
          --side=master

    - name: Render master-side PR body
      id: master-pr-body
      if: steps.resolve.outputs.should-run == 'true'
      working-directory: master-checkout
      env:
        VERSION: ${{ steps.resolve.outputs.target-version }}
        REL_BRANCH: ${{ steps.resolve.outputs.rel-branch }}
        PREV_VERSION: ${{ steps.resolve.outputs.prev-version }}
      run: |
        {
          echo 'body<<EOF'
          php tools/release/bin/render-pr-body.php "${VERSION}" \
            --template=.github/PULL_REQUEST_TEMPLATE/patch-prep-master.md \
            --rel-branch="${REL_BRANCH}" \
            --prev-version="${PREV_VERSION}"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Open master-side patch-prep PR
      if: steps.resolve.outputs.should-run == 'true'
      uses: peter-evans/create-pull-request@v8
      with:
        path: master-checkout
        token: ${{ steps.app-token.outputs.token }}
        branch: patch-prep/${{ steps.resolve.outputs.rel-branch }}-master
        base: master
        title: 'chore(release): patch-prep ${{ steps.resolve.outputs.rel-branch }} ${{ steps.resolve.outputs.target-version }} (master-side)'
        body: ${{ steps.master-pr-body.outputs.body }}
        commit-message: 'chore(release): patch-prep ${{ steps.resolve.outputs.rel-branch }} ${{ steps.resolve.outputs.target-version }} (master-side)'
        author: 'openemr-release-bot <release-bot@openemr.invalid>'
        committer: 'openemr-release-bot <release-bot@openemr.invalid>'
        draft: false
        delete-branch: false
