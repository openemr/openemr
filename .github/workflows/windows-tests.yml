name: Windows Tests

on:
  pull_request:
    branches:
    - master
    - rel-*
  push:
    branches:
    - master
    - rel-*
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'pull_request' && github.event.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  COMPOSER_PROCESS_TIMEOUT: 0
  XDEBUG_MODE: 'off'

jobs:
  windows-compatibility:
    name: Windows compatibility
    runs-on: windows-2025
    timeout-minutes: 60

    steps:
    - name: Configure Windows-safe checkout
      shell: pwsh
      run: |
        git config --global core.longpaths true
        git config --global core.protectNTFS true

    - name: Checkout code
      uses: actions/checkout@v7
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Setup PHP 8.2 and Composer
      uses: ./.github/actions/setup-php-composer
      with:
        # Linux CI owns PHP-version coverage; Windows is the variable here.
        php-version: '8.2'
        coverage: none

    - name: Report Windows environment
      shell: pwsh
      run: |
        Get-ComputerInfo | Select-Object WindowsProductName, WindowsVersion, OsBuildNumber
        php --version
        git config --show-origin --get core.longpaths

    - name: Detect case-insensitive path collisions
      shell: pwsh
      run: |
        $paths = git -c core.quotePath=false ls-files
        $collisions = $paths |
          Group-Object { $_.ToLowerInvariant() } |
          Where-Object Count -gt 1

        if ($collisions) {
          Write-Error 'Tracked paths collide on a case-insensitive Windows filesystem:'
          $collisions | ForEach-Object {
            $_.Group | ForEach-Object { Write-Host "  $_" }
          }
          exit 1
        }

    - name: Detect Windows-incompatible tracked names
      shell: pwsh
      run: |
        $reserved = '^(?i:CON|PRN|AUX|NUL|COM[1-9]|LPT[1-9])(?:\..*)?$'
        $invalid = [System.Collections.Generic.List[string]]::new()

        foreach ($path in (git -c core.quotePath=false ls-files)) {
          foreach ($part in ($path -split '/')) {
            if ($part -match $reserved -or
                $part.IndexOfAny([System.IO.Path]::GetInvalidFileNameChars()) -ge 0 -or
                $part.EndsWith('.') -or
                $part.EndsWith(' ')) {
              $invalid.Add($path)
              break
            }
          }
        }

        if ($invalid.Count -gt 0) {
          Write-Error 'Tracked paths contain names that are unsafe on Windows:'
          $invalid | Sort-Object -Unique | ForEach-Object { Write-Host "  $_" }
          exit 1
        }

    # The existing isolated suite contains tests with Unix-only permission and
    # process assumptions. Collect its Windows baseline without blocking PRs
    # until those tests are made platform-aware.
    - name: Collect isolated-suite Windows baseline
      id: windows-tests
      continue-on-error: true
      shell: bash
      run: vendor/bin/phpunit -c phpunit-isolated.xml --log-junit="$RUNNER_TEMP/junit-windows.xml"

    - name: Report isolated-suite Windows baseline
      shell: pwsh
      env:
        WINDOWS_TEST_OUTCOME: ${{ steps.windows-tests.outcome }}
      run: |
        if ($env:WINDOWS_TEST_OUTCOME -eq 'failure') {
          @"
        ## Windows isolated-test baseline

        The existing isolated suite contains pre-existing Unix-specific tests
        and is currently non-blocking on Windows. Download the `junit-windows`
        artifact for the complete results.

        Result: **failed (non-blocking)**
        "@ >> $env:GITHUB_STEP_SUMMARY
        }
        else {
          @"
        ## Windows isolated-test baseline

        Result: **passed**
        "@ >> $env:GITHUB_STEP_SUMMARY
        }

    - name: Upload Windows PHPUnit results
      uses: actions/upload-artifact@v7
      with:
        name: junit-windows
        path: ${{ runner.temp }}/junit-windows.xml
        if-no-files-found: warn
        retention-days: 14

    - name: Verify tests left the checkout clean
      shell: pwsh
      run: |
        $changes = git status --porcelain
        if ($changes) {
          Write-Error 'Tests unexpectedly modified tracked or untracked files:'
          $changes | ForEach-Object { Write-Host $_ }
          exit 1
        }
