name: PHPStan

on:
  push:
    branches:
    - master
    - rel-*
  pull_request:
    branches:
    - master
    - rel-*

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'pull_request' && github.event.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  phpstan:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        # Single-element matrix provides named variable and job title
        php-version: ['8.5']
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Setup PHP and Composer
      uses: ./.github/actions/setup-php-composer
      with:
        php-version: ${{ matrix.php-version }}
    # Hack: temporarily uninstall rector, which interferes with PHPStan
    # (it bundles some type-incomplete polyfills which can throw off results)
    - name: Remove Rector
      run: composer remove --dev --optimize-autoloader rector/rector
    # Resolve the installed phpstan version so the cache key invalidates on
    # tool bumps but survives unrelated dependency changes. Hashing the whole
    # composer.lock over-invalidates; fallback restore would otherwise serve
    # a cache produced by a different phpstan, silently corrupting results.
    - name: Resolve PHPStan version
      id: phpstan-version
      run: |
        version=$(jq -r '
          (.packages + .["packages-dev"])[]
          | select(.name == "phpstan/phpstan")
          | .version
        ' composer.lock)
        printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
    - name: Restore PHPStan Cache
      # https://phpstan.org/user-guide/result-cache
      id: phpstan-cache
      uses: actions/cache/restore@v5
      with:
        path: tmp-phpstan # same as in phpstan.neon
        key: phpstan-result-cache-${{ steps.phpstan-version.outputs.version }}-${{ hashFiles('phpstan.neon.dist', '.phpstan/**', 'tests/PHPStan/**') }}-${{ github.run_id }}
        restore-keys: |
          phpstan-result-cache-${{ steps.phpstan-version.outputs.version }}-${{ hashFiles('phpstan.neon.dist', '.phpstan/**', 'tests/PHPStan/**') }}-
    # PHPStan's container cache uses file mtimes for validation. Git doesn't
    # preserve mtimes, so without restoration every cached file looks stale
    # and the cache is effectively useless. Only worth doing when we actually
    # restored a cache - on a cold miss this is pure overhead.
    - name: Restore file timestamps
      if: steps.phpstan-cache.outputs.cache-matched-key != ''
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends git-restore-mtime
        # Guard against running on a non-shallow checkout - --unshallow errors
        # with "does not make sense" if history is already complete.
        if [ -f .git/shallow ]; then
          git fetch --unshallow --quiet
        fi
        git restore-mtime --skip-missing --quiet
    - name: PHPStan Diagnose
      run: vendor/bin/phpstan --memory-limit=8G diagnose
    # Use CI config which sets reportUnmatchedIgnoredErrors: false so this step
    # only fails for NEW errors, not stale baseline entries.
    - name: PHPStan Analyze
      id: analyze
      run: vendor/bin/phpstan --memory-limit=8G analyze -c .phpstan/phpstan.ci.neon --error-format=github
    - name: PHPStan Errors Summary
      if: failure() && steps.analyze.outcome == 'failure'
      run: |
        {
          echo '## ❌ PHPStan Errors Introduced'
          echo
          echo 'New errors were introduced that are not in the baseline.'
          echo
          echo '### Run PHPStan locally'
          echo
          echo '| Method | Command |'
          echo '|--------|---------|'
          # shellcheck disable=SC2016
          echo '| Pre-commit hook | `prek install` or `pre-commit install` (runs automatically on commit) |'
          # shellcheck disable=SC2016
          echo '| Composer | `composer phpstan` |'
          # shellcheck disable=SC2016
          echo '| Docker | `openemr-cmd pst` |'
        } >> "$GITHUB_STEP_SUMMARY"
    # Regenerate baseline for artifact upload (runs always).
    - name: Regenerate PHPStan Baseline
      if: always()
      run: composer phpstan-baseline
    # Save after baseline regeneration so the cache captures the full set of
    # PHPStan invocations for the run. Even on failure - partial cache still
    # speeds up the next run.
    - name: Save PHPStan Cache
      if: always()
      uses: actions/cache/save@v5
      with:
        path: tmp-phpstan
        key: ${{ steps.phpstan-cache.outputs.cache-primary-key }}
    # Check for baseline drift. Only meaningful when analysis passed - if analysis
    # failed, the baseline will differ due to the new errors.
    - name: Ensure baseline is stable
      if: steps.analyze.outcome == 'success'
      run: |
        if git diff --exit-code .phpstan/baseline/; then
          echo '## ✅ PHPStan Passed' >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi
        {
          echo '## ❌ PHPStan Baseline Needs Regeneration'
          echo
          echo 'Your PR does not introduce new errors, but the baseline files are out'
          echo 'of sync. This can mean the baseline was manually edited'
          echo 'or errors were fixed but the baseline was not regenerated.'
          echo
          echo '### Quick fix'
          echo
          echo 'Apply the regenerated baseline from this workflow:'
          echo
          echo '```bash'
          echo "gh run download $GITHUB_RUN_ID --name phpstan-baseline-php${{ matrix.php-version }} -D .phpstan/baseline/"
          echo '```'
          echo
          echo 'Then commit and push the changes.'
          echo
          echo '### Regenerate locally'
          echo
          # shellcheck disable=SC2016
          echo 'Or run `composer phpstan-baseline` to regenerate the baseline locally.'
        } >> "$GITHUB_STEP_SUMMARY"
        exit 1
    # Upload the resulting baseline as an artifact. On PR events this runs on
    # every outcome so the `phpstan-baseline-diff.yml` workflow can download
    # the regenerated baseline and post a comparison vs master. On push events
    # it only runs on failure, matching the prior debugging-oriented behavior.
    - name: Upload PHPStan Baseline
      if: always() && (github.event_name == 'pull_request' || failure())
      uses: actions/upload-artifact@v7
      with:
        name: phpstan-baseline-php${{ matrix.php-version }}
        path: .phpstan/baseline/*.php
