# Scheduled refresh of RESERVED_WORD_SUPPLEMENT in
# tests/PHPStan/Rules/Sql/ReservedWordRegistry.php.
#
# Spins up live MySQL + MariaDB containers, asks each engine which
# words it reserves, compares against the set phpmyadmin/sql-parser
# ships, and opens a pull request when the supplement drifts.
#
# Why live engines instead of scraping docs:
# - The server is the authoritative source for reserved-word status,
#   not docs pages (which can lag the implementation).
# - No bot/CDN blocking concerns.
# - MariaDB's INFORMATION_SCHEMA.KEYWORDS does not expose a RESERVED
#   column the way MySQL's does, so the script probes each keyword
#   via `SELECT <word>` -- a parser-level failure (SQLSTATE 42000 /
#   ERROR 1064) means reserved; a resolver-level failure (ERROR 1054
#   "unknown column") means not reserved.
#
# Snapshots:
# - tests/PHPStan/Rules/Sql/snapshots/mysql.tsv   (engine version + WORD\tRESERVED rows)
# - tests/PHPStan/Rules/Sql/snapshots/mariadb.tsv
# Both are committed alongside the supplement change so a diff in
# those files is the audit record for what the engines reported.
#
# Runs only on master in the upstream repository. Manual trigger via
# workflow_dispatch is available for maintainers.
name: Refresh reserved-word supplement

on:
  schedule:
  - cron: '0 6 * * 1' # 06:00 UTC every Monday
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    # Only run from master branch on the main repository
    if: github.repository_owner == 'openemr' && github.repository == 'openemr/openemr' && github.ref == 'refs/heads/master'
    name: Refresh supplement
    runs-on: ubuntu-24.04

    services:
      mysql:
        image: mysql:latest
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
        ports:
        - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      mariadb:
        image: mariadb:latest
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: 'yes'
        ports:
        - 3307:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup PHP and Composer
      uses: ./.github/actions/setup-php-composer
      with:
        php-version: '8.5'

    - name: Install composer dependencies
      run: composer install --no-progress --no-interaction

    - name: Refresh supplement
      env:
        MYSQL_HOST: 127.0.0.1
        MYSQL_PORT: 3306
        MARIADB_HOST: 127.0.0.1
        MARIADB_PORT: 3307
      run: php bin/refresh-reserved-word-supplement.php --write

    - name: Verify bot identity secrets are configured
      env:
        APP_ID: ${{ secrets.RESERVED_WORD_BOT_APP_ID }}
        PRIVATE_KEY: ${{ secrets.RESERVED_WORD_BOT_PRIVATE_KEY }}
      run: |
        if [ -z "$APP_ID" ] || [ -z "$PRIVATE_KEY" ]; then
          echo "::error::Required repo secrets RESERVED_WORD_BOT_APP_ID and RESERVED_WORD_BOT_PRIVATE_KEY are not set. See the setup steps in PR #12368 for how to create the GitHub App and add its credentials."
          exit 1
        fi

    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ secrets.RESERVED_WORD_BOT_APP_ID }}
        private-key: ${{ secrets.RESERVED_WORD_BOT_PRIVATE_KEY }}

    - name: Open PR if anything changed
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ steps.app-token.outputs.token }}
        commit-message: |
          chore(phpstan): refresh RESERVED_WORD_SUPPLEMENT

          Automated update from refresh-reserved-word-supplement.yml.
          Drift was detected between the live MySQL + MariaDB reserved
          word sets and what phpmyadmin/sql-parser currently ships.
          Review the diff (registry + tests/PHPStan/Rules/Sql/snapshots/)
          before merging.
        branch: bot/refresh-reserved-word-supplement
        delete-branch: true
        title: 'chore(phpstan): refresh RESERVED_WORD_SUPPLEMENT'
        body: |
          Automated update from `.github/workflows/refresh-reserved-word-supplement.yml`.

          ## What changed

          The workflow asked the latest `mysql:latest` and `mariadb:latest`
          Docker images which words they reserve, unioned the results,
          and diffed against what `phpmyadmin/sql-parser` currently
          ships in its `Context*` classes. The gap is the new
          `RESERVED_WORD_SUPPLEMENT`.

          - `tests/PHPStan/Rules/Sql/snapshots/mysql.tsv` and the
            sibling `mariadb.tsv` are the raw snapshots from each
            engine. Engine versions are captured in the header comments.
          - `tests/PHPStan/Rules/Sql/ReservedWordRegistry.php` is the
            rewritten constant.

          ## What to review

          If the new entries look like real reserved words (e.g. a new
          MySQL window function), merge. If something looks wrong
          (e.g. a normal column name showing up), check whether the
          probe falsely flagged something — open an issue or revert.
        labels: |
          dependencies
          phpstan
