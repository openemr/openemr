name: Styling

on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master

permissions:
  contents: read

jobs:

  php_styling:
    runs-on: ubuntu-22.04
    name: PHP
    steps:
    - uses: actions/checkout@v4

    - name: Install PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'

    - name: Report PHP Version
      run: php -v

    - name: Install php_codesniffer
      run: composer global require "squizlabs/php_codesniffer=3.*"

    - name: Check PHP Styling
      run: $HOME/.composer/vendor/bin/phpcs -p -n --extensions=php,inc --report-width=120 --standard=ci/phpcs.xml --report=github .

  css_styling:
    runs-on: ubuntu-22.04
    name: CSS
    steps:
    - uses: actions/checkout@v4

    - name: Install npm package
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: npm install
      run: npm install

    - name: Check CSS Styling
      run: npm run stylelint -- --formatter github

  js_linting:
    runs-on: ubuntu-22.04
    name: JS
    steps:
    - uses: actions/checkout@v4

    - name: Install npm package
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: npm install
      run: npm install

    - name: Check JS Linting
      run: npm run lint:js -- --format github
