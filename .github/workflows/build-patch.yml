name: Build Patch Release

on:
  workflow_dispatch:
    inputs:
      version_start:
        description: Start tag (e.g., v8_0_0)
        required: true
        type: string
      version_branch:
        description: Release branch (e.g., rel-800)
        required: true
        type: string
      patch_filename:
        description: Patch zip filename (e.g., 8-0-0-Patch-1.zip)
        required: true
        type: string
      release_tag:
        description: GitHub release tag to upload to (e.g., v8_0_0_1). Required unless dry run.
        required: false
        type: string
      dry_run:
        description: Dry run — build and upload as workflow artifact only, skip GitHub release
        type: boolean
        default: true
      copy_styles:
        description: Build and include compiled theme styles
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-patch:
    runs-on: ubuntu-24.04
    name: Build Patch
    steps:
    - name: Validate inputs
      if: "!inputs.dry_run && inputs.release_tag == ''"
      run: |
        printf '::error::release_tag is required when dry_run is false\n'
        exit 1

    - name: Checkout release branch (blobless for speed)
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.version_branch }}
        filter: blob:none
        fetch-depth: 0

    - name: Generate changed file list
      id: diff
      run: |
        # Exclude removed files and paths that should not ship in a patch.
        # Production installs do not need CI, testing, build tooling, docs,
        # or Docker configuration.
        git diff --name-only --diff-filter=d \
          '${{ inputs.version_start }}'..'${{ inputs.version_branch }}' \
          -- . \
          ':(exclude).github/**' \
          ':(exclude).phpstan/**' \
          ':(exclude).git/**' \
          ':(exclude)ci/**' \
          ':(exclude)docker/**' \
          ':(exclude)Documentation/**' \
          ':(exclude)tests/**' \
          ':(exclude)tools/**' \
          ':!.codespell*' \
          ':!.composer-require-checker.json' \
          ':!.dclintrc.yaml' \
          ':!.editorconfig' \
          ':!.gitattributes' \
          ':!.gitignore' \
          ':!.gitmodules' \
          ':!.hadolint.yaml' \
          ':!.pre-commit-config.yaml' \
          ':!.shellcheckrc' \
          ':!.stylelintignore' \
          ':!.stylelintrc.json' \
          ':!build.xml' \
          ':!cloudbuild.yaml' \
          ':!codecov.yml' \
          ':!composer.json' \
          ':!composer.lock' \
          ':!eslint.config.mjs' \
          ':!gulpfile.js' \
          ':!jest.config.js' \
          ':!package.json' \
          ':!package-lock.json' \
          ':!phpcs.xml.dist' \
          ':!phpstan.neon.dist' \
          ':!phpunit*.xml' \
          ':!rector*.php' \
          ':!run-semgrep.sh' \
          ':!semgrep.yaml' \
          ':!CLAUDE.md' \
          ':!CONTRIBUTING.md' \
          ':!CODE_OF_CONDUCT.md' \
          ':!DOCKER_README.md' \
          ':!README-Isolated-Testing.md' \
          > /tmp/changed-files.txt

        file_count=$(wc -l < /tmp/changed-files.txt)
        printf 'Changed files (excluding removals): %d\n' "$file_count"
        cat /tmp/changed-files.txt

    - name: Build theme styles
      if: inputs.copy_styles
      uses: actions/setup-node@v6
      with:
        node-version: '22'
    - name: Install npm and build styles
      if: inputs.copy_styles
      run: |
        npm ci
        npm run build

    - name: Assemble patch directory
      run: |
        patch_dir='patch-output'
        mkdir "$patch_dir"

        # Copy each changed file, preserving directory structure
        while IFS= read -r file; do
          if [[ -z "$file" ]]; then
            continue
          fi
          dir=$(dirname "$file")
          if [[ "$dir" != '.' ]]; then
            mkdir -p "${patch_dir}/${dir}"
          fi
          cp "$file" "${patch_dir}/${file}"
        done < /tmp/changed-files.txt

        # Copy compiled themes if requested
        if [[ '${{ inputs.copy_styles }}' = 'true' ]]; then
          printf 'Copying compiled theme styles\n'
          mkdir -p "${patch_dir}/public/themes"
          cp -R public/themes/* "${patch_dir}/public/themes/"
        fi

        # Blank out setup.php — patch should not re-run setup
        true > "${patch_dir}/setup.php"

        # Always include version.php and sql_patch.php
        cp version.php "${patch_dir}/version.php"
        cp sql_patch.php "${patch_dir}/sql_patch.php"

        # Standardize file permissions
        find "$patch_dir" -type f -print0 | xargs -0 chmod 0644

        # Report contents
        printf '\nPatch file count:\n'
        find "$patch_dir" -type f | wc -l
        printf '\nPatch file listing:\n'
        find "$patch_dir" -type f -printf '%P\n' | sort

    - name: Create patch zip and checksums
      run: |
        cd patch-output
        zip -r '../${{ inputs.patch_filename }}' .
        cd ..

        sha256sum '${{ inputs.patch_filename }}' > '${{ inputs.patch_filename }}.sha256'
        sha512sum '${{ inputs.patch_filename }}' > '${{ inputs.patch_filename }}.sha512'

        printf '\nSHA-256:\n'
        cat '${{ inputs.patch_filename }}.sha256'
        printf '\nSHA-512:\n'
        cat '${{ inputs.patch_filename }}.sha512'

    - name: Upload workflow artifact (dry run)
      if: inputs.dry_run
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.patch_filename }}
        path: |
          ${{ inputs.patch_filename }}
          ${{ inputs.patch_filename }}.sha256
          ${{ inputs.patch_filename }}.sha512
        retention-days: 7

    - name: Upload to GitHub release
      if: '!inputs.dry_run'
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        tag='${{ inputs.release_tag }}'

        # Create the release if it does not already exist
        if ! gh release view "$tag" > /dev/null 2>&1; then
          printf 'Creating release %s\n' "$tag"
          gh release create "$tag" \
            --target '${{ inputs.version_branch }}' \
            --title "$tag" \
            --notes "Patch release $tag"
        fi

        # Upload patch zip and checksums
        gh release upload "$tag" \
          '${{ inputs.patch_filename }}' \
          '${{ inputs.patch_filename }}.sha256' \
          '${{ inputs.patch_filename }}.sha512' \
          --clobber
