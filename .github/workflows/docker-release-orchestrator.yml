# Daily orchestrator for production docker image rebuilds.
#
# Reads .github/release-targets.yml as the source of truth for which
# branches to build, which docker tags to push, and which openemr source
# ref to bake in. Applies the include/exclude inputs to filter that list,
# then fans out one docker-build-release.yml dispatch per remaining row.
#
# Each fan-out call goes via `gh workflow run docker-build-release.yml
# --ref <branch> -f docker_tags=<...> -f openemr_version_ref=<...>` which
# dispatches that branch's own docker-build-release.yml against that
# branch's docker/release/Dockerfile -- per-branch isolation validated in
# the throwaway fork experiment described in
# openemr/openemr-devops#790.
#
# The docker-build-release.yml workflow:
#   * is byte-identical across master and every rel branch (it reads
#     docker_tags + openemr_version_ref purely from inputs)
#   * applies the version-number -> dated-sibling rule to docker_tags
#     (e.g. "8.1.0" gets a "8.1.0-YYYY-MM-DD" sibling pushed alongside)
#   * passes openemr_version_ref to docker build as OPENEMR_VERSION ARG
#
# Adding a rel branch: append a row to .github/release-targets.yml.
# Rotating `latest` between rel branches: edit one (or two) row(s)'s
# docker_tags in that same file. Promoting rel-810 to a v8_1_0 release:
# edit one row's openemr_version_ref from rel-810 to v8_1_0. None of
# these changes require editing this workflow file.

name: Docker release orchestrator

on:
  schedule:
  - cron: '0 6 * * *'    # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      include:
        description: 'Branches to build (comma-separated, or "all"). Examples: "all", "rel-810", "rel-810,master"'
        type: string
        default: 'all'
      exclude:
        description: 'Branches to skip (comma-separated). Useful with include=all.'
        type: string
        default: ''

permissions:
  actions: write
  contents: read

jobs:
  compute-matrix:
    name: compute-matrix
    # Only run from master in the upstream repository -- this workflow lives
    # only on master (downstream forks shouldn't trigger production builds).
    if: github.repository_owner == 'openemr' && github.repository == 'openemr/openemr' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
    - name: Sparse checkout of release-targets.yml
      uses: actions/checkout@v6
      with:
        sparse-checkout: |
          .github/release-targets.yml

    - name: Build fan-out matrix from release-targets.yml
      id: gen
      env:
        INCLUDE: ${{ inputs.include || 'all' }}
        EXCLUDE: ${{ inputs.exclude || '' }}
        EVENT: ${{ github.event_name }}
      run: |
        # yq is pre-installed on github-hosted ubuntu runners.
        # Read the YAML data, filter by include/exclude inputs, emit JSON.
        # On `schedule` events the inputs are empty -- treat as include=all.
        FILTERED=$(yq -o=json -I=0 . .github/release-targets.yml | jq -c \
          --arg inc "$INCLUDE" --arg exc "$EXCLUDE" --arg ev "$EVENT" '
          [ .[] |
            . as $row |
            select(
              ($ev == "schedule") or
              ($inc == "all") or
              ($inc | split(",") | map(. == $row.branch) | any)
            ) |
            select(
              ($exc | split(",") | map(. == $row.branch) | any) | not
            )
          ]
        ')

        if [ "$FILTERED" = '[]' ] || [ -z "$FILTERED" ]; then
          echo "::error::No targets matched include='${INCLUDE}' exclude='${EXCLUDE}'." \
               "Nothing to dispatch."
          exit 1
        fi

        echo "Resolved fan-out targets:"
        echo "$FILTERED" | jq .

        echo "matrix={\"include\":$FILTERED}" >> "$GITHUB_OUTPUT"

  fan-out:
    name: fan-out
    needs: compute-matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.compute-matrix.outputs.matrix) }}
    steps:
    - name: Dispatch ${{ matrix.branch }} (docker_tags=${{ matrix.docker_tags }} openemr_version_ref=${{ matrix.openemr_version_ref }})
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        BRANCH: ${{ matrix.branch }}
        DOCKER_TAGS: ${{ matrix.docker_tags }}
        OPENEMR_VERSION_REF: ${{ matrix.openemr_version_ref }}
      run: |
        gh workflow run docker-build-release.yml \
          --repo "$REPO" \
          --ref "$BRANCH" \
          -f docker_tags="$DOCKER_TAGS" \
          -f openemr_version_ref="$OPENEMR_VERSION_REF"
        echo "Dispatched $BRANCH with docker_tags=$DOCKER_TAGS openemr_version_ref=$OPENEMR_VERSION_REF"
