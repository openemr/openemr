openapi: 3.0.0
info:
  title: 'OpenEMR API'
  version: 8.0.1
servers:
  -
    url: /apis/default/
paths:
  /api/admin/users:
    get:
      tags:
        - standard-admin
      description: 'Retrieves a list of users with admin-level detail (username, authorized, ACL groups)'
      operationId: 7dae34736388c93876dd8344b3511cb6
      parameters:
        -
          name: fname
          in: query
          required: false
          schema:
            type: string
        -
          name: lname
          in: query
          required: false
          schema:
            type: string
        -
          name: username
          in: query
          required: false
          schema:
            type: string
        -
          name: active
          in: query
          required: false
          schema:
            type: string
        -
          name: authorized
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/standard'
        '401':
          $ref: '#/components/responses/unauthorized'
      security:
        -
          openemr_auth: []
    post:
      tags:
        - standard-admin
      description: 'Creates a new user (requires admin/super ACL)'
      operationId: c88a20b6f82a0eae752e21e7c9353b8a
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - username
                - password
                - admin_password
                - fname
                - lname
                - access_group
              properties:
                username:
                  type: string
                password:
                  description: 'Password for the new user'
                  type: string
                admin_password:
                  description: 'Current password of the authenticated admin performing this action'
                  type: string
                fname:
                  type: string
                lname:
                  type: string
                mname:
                  type: string
                suffix:
                  type: string
                email:
                  type: string
                  format: email
                authorized:
                  type: integer
                  enum: [0, 1]
                facility_id:
                  type: integer
                billing_facility_id:
                  type: integer
                npi:
                  type: string
                  maxLength: 15
                taxonomy:
                  type: string
                specialty:
                  type: string
                calendar:
                  type: integer
                  enum: [0, 1]
                portal_user:
                  type: integer
                  enum: [0, 1]
                federaltaxid:
                  type: string
                state_license_number:
                  type: string
                federaldrugid:
                  type: string
                upin:
                  type: string
                access_group:
                  type: array
                  items: { type: string }
                groupname:
                  type: string
              type: object
      responses:
        '201':
          $ref: '#/components/responses/standard'
        '400':
          $ref: '#/components/responses/badrequest'
        '401':
          $ref: '#/components/responses/unauthorized'
      security:
        -
          openemr_auth: []
  '/api/admin/users/{uuid}':
    get:
      tags:
        - standard-admin
      description: 'Retrieves a single user by UUID with admin-level detail'
      operationId: b04affd11b5bcca5bdae2fdba69d5d44
      parameters:
        -
          name: uuid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/standard'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          description: 'User not found'
      security:
        -
          openemr_auth: []
    put:
      tags:
        - standard-admin
      description: 'Updates an existing user (requires admin/super ACL)'
      operationId: 57f6153f6b3c0503f24c17df0df91963
      parameters:
        -
          name: uuid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                fname:
                  type: string
                lname:
                  type: string
                mname:
                  type: string
                suffix:
                  type: string
                email:
                  type: string
                  format: email
                authorized:
                  type: integer
                  enum: [0, 1]
                active:
                  type: integer
                  enum: [0, 1]
                facility_id:
                  type: integer
                billing_facility_id:
                  type: integer
                npi:
                  type: string
                  maxLength: 15
                taxonomy:
                  type: string
                specialty:
                  type: string
                calendar:
                  type: integer
                  enum: [0, 1]
                portal_user:
                  type: integer
                  enum: [0, 1]
                federaltaxid:
                  type: string
                state_license_number:
                  type: string
                federaldrugid:
                  type: string
                upin:
                  type: string
                access_group:
                  type: array
                  items: { type: string }
              type: object
      responses:
        '200':
          $ref: '#/components/responses/standard'
        '400':
          $ref: '#/components/responses/badrequest'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          description: 'User not found'
      security:
        -
          openemr_auth: []
    delete:
      tags:
        - standard-admin
      description: 'Deactivates a user (soft delete, sets active=0). Requires admin/super ACL.'
      operationId: 789bb31b24e5bd08dd84fcf3417053eb
      parameters:
        -
          name: uuid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/standard'
        '401':
          $ref: '#/components/responses/unauthorized'
        '404':
          description: 'User not found'
      security:
        -
          openemr_auth: []
