              schema:
                type: array
                items:
                  properties:
                    name:
                      type: string
                    title:
                      type: string
                    active:
                      type: boolean
                    running:
                      type: boolean
                    execute_interval:
                      type: integer
                    next_run:
                      type: string
                      format: date-time
                  type: object
        401:
