# Forward /modern/* to the co-resident Next.js process listening on
# loopback port 3000 (started by railway-entrypoint.sh). The dashboard
# is built with basePath="/modern" so paths round-trip cleanly — Apache
# does NOT strip the prefix, and Next.js expects to see it.
#
# mod_proxy + mod_proxy_http are loaded by /etc/apache2/conf.d/proxy.conf
# in the upstream openemr image; no LoadModule needed here.
#
# X-Forwarded-* lets Next.js generate correct absolute URLs (Set-Cookie
# Domain, OAuth redirect_uri sanity) even though it sees plain HTTP from
# the loopback hop.

ProxyPreserveHost On
ProxyPass         /modern/  http://127.0.0.1:3000/modern/
ProxyPassReverse  /modern/  http://127.0.0.1:3000/modern/

RequestHeader set X-Forwarded-Proto "https"
RequestHeader set X-Forwarded-Host  "%{HTTP_HOST}e"
