name: Fixture Flex Build (alpine fix1) -- not the default flex

# Synthetic flex caller fixture for the golden-file test. Mirrors the
# structure of docker-build-322.yml: is_default_flex: false, so the bare
# `flex` tag is NOT published by this variant. The default PHP version
# (7.4) does get the floating `flex-fix1` alongside its
# `flex-fix1-php-7.4` companion tag.

on:
  workflow_call:

jobs:
  build:
    uses: ./.github/workflows/docker-build-flex-core.yml
    with:
      is_default_flex: false
      alpine_version: "fix1"
      php_versions: '["7.4", "8.0"]'
      php_default: "7.4"
