# ONC (b)(10) Electronic Health Information (EHI) export — table set.
#
# This file is the single source of truth for which database tables are in
# scope for the (b)(10) EHI export SchemaSpy documentation. The union of every
# list below forms the SchemaSpy table include filter (`schemaspy -i <regex>`).
#
# Grouping is for documentation only: the group names record *why* each table
# is in scope. Tools that consume this file flatten all groups into one set.
#
# Versioned with the schema: when an EHI table is added or removed, edit this
# file in the same change as the schema. The website release pipeline reads
# this file from the tagged release to regenerate the published (b)(10) docs.
